<!-- SpotSure/public/service.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

/* GLOBAL DARK GLASS THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  position: relative;
}

/* full-screen image layer behind everything */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/bg1.jpg") center center / cover no-repeat;
  opacity: 0.35;
  z-index: -2;
}

/* speckle layer */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 25%, rgba(30,64,175,0.18) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(15,23,42,0.18) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(30,64,175,0.12) 0, transparent 60%);
  opacity: 0.45;
  mix-blend-mode: normal;
  z-index: -1;
}

@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.page {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 14px 28px;
  min-height: 100vh;
}

/* TOP BAR */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.top-title {
  font-size: 18px;
  font-weight: 600;
  color: #f9fafb;
}
.top-sub {
  font-size: 12px;
  color: #9ca3af;
}
.pill-btn {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 12px 26px rgba(0,0,0,1);
}
.pill-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 36px rgba(0,0,0,1);
  background: #020617;
  border-color: #6b7280;
}

/* CARD */
.card {
  background: rgba(15,23,42,0.94);
  border-radius: 18px;
  border: 1px solid rgba(31,41,55,0.9);
  padding: 14px;
  box-shadow: 0 26px 80px rgba(0,0,0,0.96);
  margin-bottom: 14px;
  backdrop-filter: blur(18px);
}

/* SERVICE HEADER */
.service-header {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}
.service-thumb {
  width: 54px;
  height: 54px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #d1d5db;
  background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #020617 100%);
  box-shadow: 0 6px 18px rgba(0,0,0,0.9);
  flex-shrink: 0;
}
.service-thumb.hospital {
  background: radial-gradient(circle at 0 0, #0f172a 0, #020617 55%, #020617 100%);
}
.service-thumb.clinic {
  background: radial-gradient(circle at 0 0, #022c22 0, #020617 55%, #020617 100%);
}
.service-thumb.school {
  background: radial-gradient(circle at 0 0, #1e1b4b 0, #020617 55%, #020617 100%);
}
.service-thumb.restaurant {
  background: radial-gradient(circle at 0 0, #451a03 0, #020617 55%, #020617 100%);
}
.service-thumb.grocery {
  background: radial-gradient(circle at 0 0, #064e3b 0, #020617 55%, #020617 100%);
}
.service-thumb.college {
  background: radial-gradient(circle at 0 0, #1f2937 0, #020617 55%, #020617 100%);
}
.service-thumb.default {
  background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #020617 100%);
}

.service-main h1 {
  margin: 0 0 4px;
  font-size: 18px;
  color: #f9fafb;
}
.service-main p {
  margin: 0;
  font-size: 12px;
  color: #9ca3af;
  line-height: 1.4;
}

.rating-row {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 6px;
}

/* Provider image row */
.provider-images-row {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 2px;
}
.provider-thumb {
  width: 54px;
  height: 54px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid #1f2937;
  cursor: pointer;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.btn-primary {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 13px;
  cursor: pointer;
  background: #020617;
  color: #e5e7eb;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 14px 32px rgba(0,0,0,0.95);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 18px 44px rgba(0,0,0,0.98);
  border-color: #6b7280;
}
.btn-secondary {
  background: #020617;
}
.btn-secondary:hover {
  background: #020617;
}
.btn-danger-ghost {
  background: rgba(15,23,42,0.96);
  border: 1px solid #b91c1c;
  color: #fecaca;
}
.btn-danger-ghost:hover {
  background: #1f2937;
}

.icon {
  font-size: 14px;
}

/* Report UI */
.report-block {
  margin-top: 10px;
  font-size: 12px;
  color: #9ca3af;
}
.report-textarea {
  width: 100%;
  min-height: 60px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  font-size: 12px;
  padding: 6px 8px;
}

/* Rating face pill for each review */
.rating-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
}
.rating-tag span.emoji {
  font-size: 13px;
}
.rating-tag.excellent {
  background: rgba(22,163,74,0.16);
  color: #bbf7d0;
}
.rating-tag.good {
  background: rgba(37,99,235,0.16);
  color: #bfdbfe;
}
.rating-tag.average {
  background: rgba(245,158,11,0.16);
  color: #fed7aa;
}
.rating-tag.poor {
  background: rgba(249,115,22,0.18);
  color: #fed7aa;
}
.rating-tag.terrible {
  background: rgba(248,113,113,0.22);
  color: #fee2e2;
}

/* Reviews – card layout */
.review-item {
  margin-bottom: 10px;
  font-size: 13px;
  padding: 9px;
  border-radius: 12px;
  border: 1px solid #111827;
  background: radial-gradient(circle at top left, rgba(15,23,42,0.96), rgba(15,23,42,0.9));
  box-shadow: 0 12px 28px rgba(0,0,0,0.9);
}

.review-top {
  display: flex;
  gap: 8px;
}

.review-avatar {
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: radial-gradient(circle at 0 0, #22c55e 0, #15803d 40%, #020617 90%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: #ecfdf5;
  flex-shrink: 0;
  text-transform: uppercase;
}

.review-main {
  flex: 1;
  min-width: 0;
}

.review-header-line {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 6px;
}

.review-name {
  font-size: 13px;
  font-weight: 500;
  color: #e5e7eb;
}

.review-date {
  font-size: 11px;
  color: #6b7280;
  margin-bottom: 4px; /* added spacing */
}

/* no stars row inside review card */

.review-comment {
  margin-top: 4px;
  font-size: 13px;
  color: #d1d5db;
  line-height: 1.4;
}

.review-meta-row {
  margin-top: 6px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
}

.review-images {
  margin-top: 6px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.review-thumb {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #4b5563;
}

.no-reviews {
  font-size: 13px;
  color: #6b7280;
}

/* Stars (used for header rating text if needed) */
.stars {
  color: #fbbf24;
  font-size: 14px;
  letter-spacing: 1px;
}
.stars-empty {
  color: #4b5563;
}

/* Inline review report */
.review-report-form {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed #374151;
}
.review-report-textarea {
  width: 100%;
  min-height: 50px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  font-size: 12px;
  padding: 6px 8px;
}

/* Compact report button inside card */
.review-report-button {
  padding: 3px 8px;
  font-size: 11px;
}

/* Toast */
#toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  background: #111827;
  color: #e5e7eb;
  padding: 9px 14px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 60;
  max-width: 90%;
  text-align: left;
  white-space: pre-line;
}
#toastMessage {
  margin-right: 40px;
}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <div class="top-title" id="serviceTitle">Service</div>
      <div class="top-sub" id="serviceSub"></div>
    </div>
  </div>

  <div class="card" id="serviceCard" style="display:none;">
    <div class="service-header">
      <div id="serviceIcon" class="service-thumb default">⭐</div>
      <div class="service-main">
        <h1 id="serviceName"></h1>
        <p id="serviceMeta"></p>
        <div class="rating-row" id="serviceRating"></div>
      </div>
    </div>
    <p id="serviceAddressText" style="font-size:13px; color:#e5e7eb; margin:4px 0 0;"></p>

    <!-- Provider images row -->
    <div id="providerImagesRow" class="provider-images-row" style="display:none;"></div>

    <div class="btn-row">
      <button class="btn-primary" type="button" onclick="openAddReview()">
        <span class="icon">✍️</span>
        <span>Add review</span>
      </button>

      <button class="btn-primary btn-secondary" type="button" onclick="navigateToService()" title="Navigate">
        <span class="icon">📍</span>
      </button>

      <button
        class="btn-primary btn-danger-ghost"
        type="button"
        onclick="toggleServiceReport()"
        style="padding:4px 8px; font-size:12px; border-radius:999px; min-width:auto;"
        title="Report service"
      >
        <span class="icon">🚩</span>
      </button>

      <button
        id="requestDeleteBtn"
        class="btn-primary btn-danger-ghost"
        type="button"
        style="display:none;"
        onclick="requestDeleteService()"
      >
        <span class="icon">🗑️</span>
        <span>Request delete</span>
      </button>
    </div>

    <div class="report-block">
      <div id="serviceReportForm" style="display:none; margin-top:8px;">
        <label style="font-size:11px; color:#9ca3af;">Why are you reporting this service?</label>
        <textarea id="serviceReportReason" class="report-textarea" placeholder="Describe the issue..."></textarea>
        <div style="margin-top:6px; display:flex; gap:6px; justify-content:flex-end;">
          <button
            type="button"
            class="btn-primary btn-danger-ghost"
            style="padding:5px 10px; font-size:12px;"
            onclick="submitServiceReport()"
          >
            Submit report
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 style="margin:0 0 8px; font-size:15px; color:#f9fafb;">Reviews</h2>
    <div id="reviewsContainer"></div>
  </div>

  <p id="loadingText" style="font-size:13px; color:#9ca3af;">Loading service...</p>
</div>

<div id="toast">
  <span id="toastMessage"></span>
</div>

<script>
const API_BASE = window.location.origin + '/api';
let toastTimer = null;
let currentService = null;
let currentUser = null;

function getServiceIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function openAddReview() {
  const id = getServiceIdFromUrl();
  if (!id) return;
  window.location.href = '/add-review.html?id=' + encodeURIComponent(id);
}

function showToast(message) {
  const t = document.getElementById('toast');
  const msg = document.getElementById('toastMessage');
  if (!t || !msg) return;
  msg.textContent = message;
  t.style.opacity = '1';
  t.style.pointerEvents = 'auto';
  t.style.transform = 'translateX(-50%) translateY(-4px)';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.pointerEvents = 'none';
    t.style.transform = 'translateX(-50%) translateY(0)';
  }, 2000);
}

function getCategoryIconInfo(category) {
  const c = (category || '').toLowerCase();
  if (c === 'hospital') return { icon: '➕', cls: 'hospital' };
  if (c === 'clinic') return { icon: '🩺', cls: 'clinic' };
  if (c === 'school') return { icon: '🏫', cls: 'school' };
  if (c === 'restaurant') return { icon: '🍽️', cls: 'restaurant' };
  if (c === 'grocery') return { icon: '🛒', cls: 'grocery' };
  if (c === 'college') return { icon: '🎓', cls: 'college' };
  return { icon: '⭐', cls: 'default' };
}

function buildRatingText(s) {
  const avg = Number(s.averageRating || 0).toFixed(1);
  const ratingsCount = Number(s.ratingCount || 0);
  const reviewsCount = Number(s.reviewCount || 0);

  const ratingsLabel = ratingsCount === 1
    ? '1 rating'
    : ratingsCount + ' ratings';

  const reviewsLabel = reviewsCount === 0
    ? 'No reviews'
    : (reviewsCount === 1 ? '1 review' : reviewsCount + ' reviews');

  return avg + ' ★ • ' + ratingsLabel + ' • ' + reviewsLabel;
}

function buildNavigationUrl(svc) {
  const parts = [];
  if (svc.address) parts.push(svc.address);
  else {
    if (svc.name) parts.push(svc.name);
    if (svc.city) parts.push(svc.city);
    if (svc.pincode) parts.push(svc.pincode);
  }
  const query = encodeURIComponent(parts.join(', '));
  return 'https://www.google.com/maps/search/?api=1&query=' + query;
}

/* Navigation – open Maps URL in new tab */
function navigateToService() {
  if (!currentService) return;

  const parts = [];
  if (currentService.address) parts.push(currentService.address);
  else {
    if (currentService.name) parts.push(currentService.name);
    if (currentService.city) parts.push(currentService.city);
    if (currentService.pincode) parts.push(currentService.pincode);
  }

  const query = parts.join(', ');

  // If Kodular bridge exists, send a message to the app
  if (window.Kodular && typeof window.Kodular.setWebViewString === 'function') {
    window.Kodular.setWebViewString('NAVIGATE:' + query);
  } else {
    // Fallback for normal browser (desktop) – open in maps web
    const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
    window.open(url, '_blank');
  }
}
async function loadCurrentUser() {
  try {
    const res = await fetch(API_BASE + '/auth/me', {
      credentials: 'include',
    });
    if (!res.ok) return;
    const data = await res.json();
    currentUser = data.user || null;
  } catch (e) {
    currentUser = null;
  }
}

function updateCreatorActionsVisibility() {
  const btn = document.getElementById('requestDeleteBtn');
  if (!btn || !currentService) return;
  if (!currentUser || !currentService.createdBy) {
    btn.style.display = 'none';
    return;
  }
  if (String(currentService.createdBy) === String(currentUser.id)) {
    btn.style.display = 'inline-flex';
  } else {
    btn.style.display = 'none';
  }
}

async function loadService() {
  const id = getServiceIdFromUrl();
  const loadingEl = document.getElementById('loadingText');
  const cardEl = document.getElementById('serviceCard');
  if (!id) {
    if (loadingEl) loadingEl.textContent = 'Missing service id.';
    return;
  }

  try {
    const res = await fetch(API_BASE + '/services/' + id);
    if (!res.ok) throw new Error();
    const s = await res.json();
    currentService = s;

    document.getElementById('serviceTitle').textContent = s.name || 'Service';
    document.getElementById('serviceSub').textContent =
      (s.category || 'Service') + ' • ' + (s.city || '');
    document.getElementById('serviceName').textContent = s.name || 'Service';
    document.getElementById('serviceMeta').textContent =
      (s.city || '') + (s.pincode ? ' • PIN ' + s.pincode : '');
    document.getElementById('serviceRating').textContent = buildRatingText(s);
    document.getElementById('serviceAddressText').textContent =
      s.address || '';

    const iconInfo = getCategoryIconInfo(s.category);
    const iconEl = document.getElementById('serviceIcon');
    iconEl.textContent = iconInfo.icon;
    iconEl.className = 'service-thumb ' + iconInfo.cls;

    const row = document.getElementById('providerImagesRow');
    const imgs = s.providerImages || [];
    row.innerHTML = '';
    if (imgs.length > 0) {
      row.style.display = 'flex';
      imgs.forEach((url) => {
        const el = document.createElement('img');
        el.src = url;
        el.className = 'provider-thumb';
        el.onclick = () => window.open(url, '_blank');
        row.appendChild(el);
      });
    } else {
      row.style.display = 'none';
    }

    if (loadingEl) loadingEl.style.display = 'none';
    if (cardEl) cardEl.style.display = 'block';

    updateCreatorActionsVisibility();
    loadReviews();
  } catch (err) {
    console.error(err);
    if (loadingEl) loadingEl.textContent = 'Error loading service.';
    showToast('Error loading service');
  }
}

/* Rating face pill builder */
function buildRatingTag(rating) {
  const r = Number(rating || 0);
  let label = 'Not rated';
  let emoji = '😐';
  let cls = 'average';

  if (r >= 4.5) {
    label = 'Excellent';
    emoji = '😍';
    cls = 'excellent';
  } else if (r >= 3.5) {
    label = 'Good';
    emoji = '🙂';
    cls = 'good';
  } else if (r >= 2.5) {
    label = 'Average';
    emoji = '😐';
    cls = 'average';
  } else if (r >= 1.5) {
    label = 'Poor';
    emoji = '🙁';
    cls = 'poor';
  } else if (r > 0) {
    label = 'Terrible';
    emoji = '😖';
    cls = 'terrible';
  }

  return `
    <span class="rating-tag ${cls}">
      <span class="emoji">${emoji}</span>
      <span>${label}</span>
    </span>
  `;
}

async function loadReviews() {
  const id = getServiceIdFromUrl();
  if (!id) return;
  try {
    const res = await fetch(API_BASE + '/services/' + id + '/reviews');
    if (!res.ok) throw new Error();
    const data = await res.json();
    const reviews = data.reviews || data;
    const container = document.getElementById('reviewsContainer');
    container.innerHTML = '';

    if (!reviews.length) {
      container.innerHTML =
        '<p class="no-reviews">No reviews yet. Be the first to add one.</p>';
      return;
    }

    reviews.forEach((r) => {
      const item = document.createElement('div');
      item.className = 'review-item';

      const paths = r.imagePaths || r.imageUrls || [];
      let imagesHtml = '';
      if (paths.length > 0) {
        imagesHtml =
          '<div class="review-images">' +
          paths
            .map(
              (path) =>
                `<img src="${path}" class="review-thumb" onclick="window.open('${path}', '_blank')">`
            )
            .join('') +
          '</div>';
      }

      const reviewId = r._id || '';
      const createdAt = r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '';
      const username = r.username || 'Anonymous';
      const initials = username
        .split(' ')
        .filter(Boolean)
        .map(part => part.charAt(0))
        .join('')
        .slice(0, 2)
        .toUpperCase() || 'U';

      const hasComment = !!(r.comment && r.comment.trim());

      item.innerHTML = `
        <div class="review-top">
          <div class="review-avatar">${initials}</div>
          <div class="review-main">
            <div class="review-header-line">
              <div>
                <div class="review-name">${username}</div>
                <div class="review-date">${createdAt}</div>
              </div>
              ${buildRatingTag(r.rating)}
            </div>
            <div class="review-comment">${r.comment || ''}</div>
            ${imagesHtml}
            <div class="review-meta-row">
              ${
                hasComment
                  ? `
              <button
                type="button"
                class="btn-primary btn-danger-ghost review-report-button"
                onclick="toggleReviewReport('${reviewId}')"
                title="Report review"
              >
                <span class="icon">🚩</span>
              </button>
              `
                  : ''
              }
            </div>
            <div id="review-report-${reviewId}" class="review-report-form" style="display:none;">
              <label style="font-size:11px; color:#9ca3af;">Why are you reporting this review?</label>
              <textarea
                class="review-report-textarea"
                id="review-report-text-${reviewId}"
                placeholder="Describe the issue..."
              ></textarea>
              <div style="margin-top:6px; display:flex; justify-content:flex-end; gap:6px;">
                <button
                  type="button"
                  class="btn-primary btn-danger-ghost"
                  style="padding:4px 10px; font-size:12px;"
                  onclick="submitReviewReport('${reviewId}')"
                >
                  Submit
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      container.appendChild(item);
    });
  } catch (e) {
    const container = document.getElementById('reviewsContainer');
    container.innerHTML = '<p class="no-reviews">Error loading reviews.</p>';
  }
}

function buildStars(rating) {
  const fullCount = Math.round(rating || 0);
  const full = '★'.repeat(fullCount);
  const empty = '☆'.repeat(5 - fullCount);
  return '<span class="stars">' + full +
    '</span><span class="stars stars-empty">' + empty + '</span>';
}

/* Request delete (creator-only) */
async function requestDeleteService() {
  if (!currentService) return;
  const id = currentService._id;
  if (!id) return;

  try {
    const res = await fetch(API_BASE + '/services/' + id + '/request-remove', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.message || 'Failed to request delete');
      return;
    }
    showToast('Delete request sent to admin.');
  } catch (err) {
    console.error(err);
    showToast('Error requesting delete');
  }
}

/* Service report */
function toggleServiceReport() {
  const block = document.getElementById('serviceReportForm');
  if (!block) return;
  block.style.display =
    block.style.display === 'none' || !block.style.display ? 'block' : 'none';
}

async function submitServiceReport() {
  if (!currentService) return;
  const reasonEl = document.getElementById('serviceReportReason');
  const reason = reasonEl ? reasonEl.value.trim() : '';
  if (!reason) {
    showToast('Please describe the issue.');
    return;
  }
  try {
    const res = await fetch(API_BASE + '/reports/service', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ serviceId: currentService._id, reason }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.message || 'Failed to submit report');
      return;
    }
    showToast('Service reported');
    if (reasonEl) reasonEl.value = '';
    toggleServiceReport();
  } catch (err) {
    console.error(err);
    showToast('Error submitting report');
  }
}

/* Review report – inline, no prompt */
function toggleReviewReport(reviewId) {
  if (!reviewId) return;
  const block = document.getElementById('review-report-' + reviewId);
  if (!block) return;
  block.style.display =
    block.style.display === 'none' || !block.style.display ? 'block' : 'none';
}

async function submitReviewReport(reviewId) {
  if (!reviewId) return;
  const reasonEl = document.getElementById('review-report-text-' + reviewId);
  const reason = reasonEl ? reasonEl.value.trim() : '';
  if (!reason) {
    showToast('Please describe the issue.');
    return;
  }
  try {
    const res = await fetch(API_BASE + '/reports/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reviewId, reason }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.message || 'Failed to report review');
      return;
    }
    showToast('Review reported');
    if (reasonEl) reasonEl.value = '';
    toggleReviewReport(reviewId);
  } catch (err) {
    console.error(err);
    showToast('Error reporting review');
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadCurrentUser();
  await loadService();
});
