<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotsure | Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px;
      }
      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .service-title {
        font-size: 20px;
        font-weight: 600;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }
      .icon-btn svg {
        width: 18px;
        height: 18px;
        stroke: #e5e7eb;
      }
      .icon-btn--navigate {
        border-color: #22c55e;
        background: #022c22;
      }
      .icon-btn--report {
        border-color: #f97373;
        background: #2b090f;
      }
      .section {
        margin-top: 16px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-row">
        <div class="service-title" id="service-name">Service name</div>

        <div class="actions">
          <!-- Navigate: icon only, new icon -->
          <button
            id="navigate-btn"
            class="icon-btn icon-btn--navigate"
            title="Navigate"
          >
            <!-- location pin icon -->
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M12 21s6-5.05 6-10.2C18 7.02 15.314 4.5 12 4.5S6 7.02 6 10.8C6 15.95 12 21 12 21z"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              ircle
                cx="12"
                cy="10.5"
                r="2.3"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <!-- Report: icon only, no text -->
          <button
            id="report-btn"
            class="icon-btn icon-btn--report"
            title="Report"
          >
            <!-- simple flag/alert icon -->
            <svg viewBox="0 0 24 24" fill="none">
              <path
                d="M6 4.5v15"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M6 5h9.5a1.5 1.5 0 0 1 1.2 2.4L15 10l1.7 2.6A1.5 1.5 0 0 1 15.5 15H6"
                stroke-width="1.7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      </div>

      <div class="section" id="service-details">
        <!-- existing details content populated by JS -->
      </div>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";

      // Example: fetch and render service details (reuse your existing logic)
      async function loadService() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        if (!id) return;

        const res = await fetch(`${API_BASE}/services/${id}`);
        const data = await res.json();
        if (!res.ok) {
          console.error(data);
          return;
        }

        document.getElementById("service-name").textContent = data.name || "";
        const detailsEl = document.getElementById("service-details");
        detailsEl.innerHTML = `
          <div><strong>City:</strong> ${data.city || ""}</div>
          <div><strong>Pincode:</strong> ${data.pincode || ""}</div>
          <div><strong>Address:</strong> ${data.address || ""}</div>
        `;
        setupActions(data);
      }

      function setupActions(service) {
        const navigateBtn = document.getElementById("navigate-btn");
        const reportBtn = document.getElementById("report-btn");

        navigateBtn.addEventListener("click", () => {
          if (!service.latitude || !service.longitude) return;
          const url = `https://www.google.com/maps/dir/?api=1&destination=${service.latitude},${service.longitude}`;
          window.open(url, "_blank");
        });

        reportBtn.addEventListener("click", () => {
          // keep your existing report handler; here we just show a placeholder
          alert("Report clicked");
        });
      }

      loadService();
    </script>
  </body>
</html>
