<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Service details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

/* GLOBAL THEME (same as index/services) */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #020617, #020617, #020617, #020617);
  background-size: 220% 220%;
  animation: bgShift 16s ease-in-out infinite;
  color: #e5e7eb;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 25%, rgba(30,64,175,0.3) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(15,23,42,0.24) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(30,64,175,0.18) 0, transparent 60%);
  opacity: 0.7;
  mix-blend-mode: screen;
  z-index: -1;
}
@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.page {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 20px 14px 28px;
  position: relative;
  z-index: 1;
}

/* SHARED GLASS CARD */
.card {
  background: rgba(15,23,42,0.94);
  border-radius: 18px;
  border: 1px solid rgba(55,65,81,0.9);
  box-shadow: 0 24px 55px rgba(0,0,0,1);
  backdrop-filter: blur(22px);
  padding: 16px 14px 14px;
  margin-bottom: 14px;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 30px 60px rgba(0,0,0,1);
  border-color: #9ca3af;
}

/* top bar */
.top-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.back-btn {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  padding: 6px 10px;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.back-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,0,1);
  border-color: #6b7280;
}
.page-title {
  font-size: 16px;
  font-weight: 600;
}

/* header info */
.service-header {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.service-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  color: #f9fafb;
  flex-shrink: 0;
  background: radial-gradient(circle at 0 0, #1d4ed8 0, #1e40af 40%, #020617 100%);
  box-shadow: 0 4px 14px rgba(30,64,175,0.95);
}
.service-main h1 {
  font-size: 18px;
  margin: 0 0 4px;
}
.service-main p {
  margin: 0;
  font-size: 12px;
  color: #9ca3af;
}

/* rating summary */
.rating-summary {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
  color: #9ca3af;
}
.rating-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 999px;
  padding: 4px 9px;
  background: rgba(34,197,94,0.16);
  color: #bbf7d0;
  font-size: 12px;
}
.rating-badge .star { color: #fbbf24; }

/* section titles */
.section-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

/* info rows */
.info-row {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
}

/* reviews */
.review {
  border-radius: 12px;
  border: 1px solid #1f2937;
  padding: 10px 10px 8px;
  background: rgba(15,23,42,0.9);
  margin-bottom: 8px;
}
.review-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.review-name {
  font-size: 12px;
  font-weight: 600;
}
.review-meta {
  font-size: 11px;
  color: #6b7280;
}
.review-text {
  font-size: 12px;
  color: #d1d5db;
}

/* buttons */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.btn-primary {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,0,1);
  border-color: #6b7280;
}

/* loading / errors */
#service-loading,
#reviews-loading {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 6px;
}
.error-text {
  font-size: 13px;
  color: #f97316;
}
</style>
</head>
<body>
<div class="page">
  <header class="top-bar">
    <button class="back-btn" type="button" onclick="goBack()">
      ← Back
    </button>
    <div class="page-title">Service details</div>
  </header>

  <div id="serviceCard" class="card">
    <div id="service-loading">Loading service...</div>
    <div id="service-error" class="error-text" style="display:none;"></div>

    <div id="service-content" style="display:none;">
      <div class="service-header">
        <div id="serviceIcon" class="service-icon">⭐</div>
        <div class="service-main">
          <h1 id="serviceName"></h1>
          <p id="serviceMeta"></p>
          <div class="rating-summary">
            <div class="rating-badge">
              <span class="star">★</span>
              <span id="avgRatingLabel">New</span>
            </div>
            <span id="ratingCounts"></span>
          </div>
        </div>
      </div>

      <div style="margin-top:10px;">
        <div class="section-title">Info</div>
        <div class="info-row" id="serviceAddress"></div>
        <div class="info-row" id="servicePhone"></div>
        <div class="info-row" id="servicePincode"></div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" type="button" onclick="openMap()">
          📍 Open in maps
        </button>
        <button class="btn-primary" type="button" onclick="goToAddReview()">
          ✏️ Add review
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Reviews</div>
    <div id="reviews-loading">Loading reviews...</div>
    <div id="reviews-error" class="error-text" style="display:none;"></div>
    <div id="reviews"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api';

function getQueryParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

function goBack() {
  if (document.referrer) {
    window.history.back();
  } else {
    window.location.href = '/services.html';
  }
}

function getCategoryIcon(category) {
  const c = (category || '').toLowerCase();
  if (c === 'hospital') return '➕';
  if (c === 'clinic') return '🩺';
  if (c === 'school') return '🏫';
  if (c === 'restaurant') return '🍽️';
  if (c === 'grocery') return '🛒';
  return '⭐';
}

function buildRatingPieces(s) {
  const avg = Number(s.averageRating || 0);
  const avgLabel = avg > 0 ? avg.toFixed(1) : 'New';
  const ratingsCount = Number(s.ratingCount || 0);
  const reviewsCount = Number(s.reviewCount || 0);

  const ratingsLabel = ratingsCount === 1 ? '1 rating' : ratingsCount + ' ratings';
  const reviewsLabel =
    reviewsCount === 0 ? 'No reviews' :
    reviewsCount === 1 ? '1 review' :
    reviewsCount + ' reviews';
  return { avgLabel, ratingsLabel, reviewsLabel };
}

function renderService(service) {
  const loadingEl = document.getElementById('service-loading');
  const errorEl = document.getElementById('service-error');
  const contentEl = document.getElementById('service-content');

  loadingEl.style.display = 'none';
  errorEl.style.display = 'none';
  contentEl.style.display = 'block';

  document.getElementById('serviceName').textContent = service.name || 'Unknown service';
  document.getElementById('serviceMeta').textContent =
    (service.category || 'Service') + ' • ' + (service.city || '');

  const { avgLabel, ratingsLabel, reviewsLabel } = buildRatingPieces(service);
  document.getElementById('avgRatingLabel').textContent = avgLabel;
  document.getElementById('ratingCounts').textContent = ratingsLabel + ' • ' + reviewsLabel;

  document.getElementById('serviceIcon').textContent = getCategoryIcon(service.category);

  const addrParts = [service.addressLine1, service.addressLine2].filter(Boolean);
  document.getElementById('serviceAddress').textContent =
    addrParts.length ? '📍 ' + addrParts.join(', ') : '';

  document.getElementById('servicePhone').textContent =
    service.phone ? '📞 ' + service.phone : '';

  document.getElementById('servicePincode').textContent =
    service.pincode ? '🏷️ Pincode: ' + service.pincode : '';
}

function showServiceError(msg) {
  document.getElementById('service-loading').style.display = 'none';
  const errorEl = document.getElementById('service-error');
  errorEl.textContent = msg || 'Error loading service.';
  errorEl.style.display = 'block';
}

async function loadService() {
  const id = getQueryParam('id');
  if (!id) {
    showServiceError('No service id provided.');
    return;
  }
  try {
    const res = await fetch(API_BASE + '/services/' + encodeURIComponent(id));
    if (!res.ok) throw new Error('Failed to load service');
    const data = await res.json();
    renderService(data.service || data);
  } catch (err) {
    console.error(err);
    showServiceError('Error loading service.');
  }
}

function renderReviews(list) {
  const loadingEl = document.getElementById('reviews-loading');
  const errorEl = document.getElementById('reviews-error');
  const container = document.getElementById('reviews');

  loadingEl.style.display = 'none';
  errorEl.style.display = 'none';
  container.innerHTML = '';

  if (!list.length) {
    container.innerHTML =
      '<p style="font-size:12px; color:#9ca3af;">No reviews yet. Be the first to add one.</p>';
    return;
  }

  list.forEach((r) => {
    const div = document.createElement('div');
    div.className = 'review';

    const header = document.createElement('div');
    header.className = 'review-header';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'review-name';
    nameSpan.textContent = r.reviewerName || 'Anonymous';

    const metaSpan = document.createElement('span');
    metaSpan.className = 'review-meta';
    const rating = r.rating != null ? r.rating : '-';
    metaSpan.textContent = '★ ' + rating + ' • ' + (r.createdAt || '').slice(0, 10);

    header.appendChild(nameSpan);
    header.appendChild(metaSpan);

    const textP = document.createElement('p');
    textP.className = 'review-text';
    textP.textContent = r.comment || '';

    div.appendChild(header);
    div.appendChild(textP);

    container.appendChild(div);
  });
}

function showReviewsError(msg) {
  document.getElementById('reviews-loading').style.display = 'none';
  const errorEl = document.getElementById('reviews-error');
  errorEl.textContent = msg || 'Error loading reviews.';
  errorEl.style.display = 'block';
}

async function loadReviews() {
  const id = getQueryParam('id');
  if (!id) {
    showReviewsError('No service id provided.');
    return;
  }
  try {
    const res = await fetch(API_BASE + '/services/' + encodeURIComponent(id) + '/reviews');
    if (!res.ok) throw new Error('Failed to load reviews');
    const data = await res.json();
    renderReviews(data.reviews || data);
  } catch (err) {
    console.error(err);
    showReviewsError('Error loading reviews.');
  }
}

function openMap() {
  const name = document.getElementById('serviceName').textContent || '';
  const meta = document.getElementById('serviceMeta').textContent || '';
  const q = encodeURIComponent(name + ' ' + meta);
  window.open('https://www.google.com/maps/search/?api=1&query=' + q, '_blank');
}

function goToAddReview() {
  const id = getQueryParam('id');
  if (!id) return;
  window.location.href = '/add-review.html?id=' + encodeURIComponent(id);
}

document.addEventListener('DOMContentLoaded', () => {
  loadService();
  loadReviews();
});
</script>
</body>
</html>
