<!-- SpotSure/public/service.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

/* GLOBAL DARK GLASS THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  position: relative;
  overflow-x: hidden; /* allow vertical scroll */
}

/* Background image layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/image.jpg") center center / cover no-repeat;
  opacity: 0.35;
  z-index: -2;
}

/* Speckle layer (unchanged) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 25%, rgba(30,64,175,0.18) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(15,23,42,0.18) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(30,64,175,0.12) 0, transparent 60%);
  opacity: 0.45;
  mix-blend-mode: normal;
  z-index: -1;
}
@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.page {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 14px 28px;
  min-height: 100vh;
}

/* TOP BAR */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.top-title {
  font-size: 18px;
  font-weight: 600;
  color: #f9fafb;
}
.top-sub {
  font-size: 12px;
  color: #9ca3af;
}
.pill-btn {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 12px 26px rgba(0,0,0,1);
}
.pill-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 36px rgba(0,0,0,1);
  background: #020617;
  border-color: #6b7280;
}

/* CARD */
.card {
  background: rgba(15,23,42,0.94);
  border-radius: 18px;
  border: 1px solid rgba(31,41,55,0.9);
  padding: 14px;
  box-shadow: 0 26px 80px rgba(0,0,0,0.96);
  margin-bottom: 14px;
  backdrop-filter: blur(18px);
}

/* SERVICE HEADER */
.service-header {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}
.service-thumb {
  width: 54px;
  height: 54px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #d1d5db;
  background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #020617 100%);
  box-shadow: 0 6px 18px rgba(0,0,0,0.9);
  flex-shrink: 0;
}
.service-thumb.hospital {
  background: radial-gradient(circle at 0 0, #0f172a 0, #020617 55%, #020617 100%);
}
.service-thumb.clinic {
  background: radial-gradient(circle at 0 0, #022c22 0, #020617 55%, #020617 100%);
}
.service-thumb.school {
  background: radial-gradient(circle at 0 0, #1e1b4b 0, #020617 55%, #020617 100%);
}
.service-thumb.restaurant {
  background: radial-gradient(circle at 0 0, #451a03 0, #020617 55%, #020617 100%);
}
.service-thumb.grocery {
  background: radial-gradient(circle at 0 0, #064e3b 0, #020617 55%, #020617 100%);
}
.service-thumb.college {
  background: radial-gradient(circle at 0 0, #1f2937 0, #020617 55%, #020617 100%);
}
.service-thumb.default {
  background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #020617 100%);
}

.service-main h1 {
  margin: 0 0 4px;
  font-size: 18px;
  color: #f9fafb;
}
.service-main p {
  margin: 0;
  font-size: 12px;
  color: #9ca3af;
  line-height: 1.4;
}

.rating-row {
  font-size: 12px;
  color: #9ca3af;
  margin-top: 6px;
}

/* Provider image row */
.provider-images-row {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 2px;
}
.provider-images-row::-webkit-scrollbar {
  height: 4px;
}
.provider-thumb {
  width: 54px;
  height: 54px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  border: 1px solid #1f2937;
  cursor: pointer;
}

/* Buttons */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.btn-primary {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 13px;
  cursor: pointer;
  background: #020617;
  color: #e5e7eb;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 14px 32px rgba(0,0,0,0.95);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 18px 44px rgba(0,0,0,0.98);
  border-color: #6b7280;
}
.btn-secondary {
  background: #020617;
}
.btn-secondary:hover {
  background: #020617;
}
.btn-danger-ghost {
  background: rgba(15,23,42,0.96);
  border: 1px solid #b91c1c;
  color: #fecaca;
}
.btn-danger-ghost:hover {
  background: #1f2937;
}

.icon {
  font-size: 14px;
}

/* Report UI */
.report-block {
  margin-top: 10px;
  font-size: 12px;
  color: #9ca3af;
}
.report-textarea {
  width: 100%;
  min-height: 60px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  font-size: 12px;
  padding: 6px 8px;
}

/* Reviews */
.review-item {
  margin-bottom: 10px;
  font-size: 13px;
}
.review-meta {
  font-size: 11px;
  color: #9ca3af;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
}
.review-images {
  margin-top: 4px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.review-thumb {
  width: 40px;
  height: 40px;
  border-radius: 4px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #4b5563;
}
.no-reviews {
  font-size: 13px;
  color: #6b7280;
}
.stars {
  color: #fbbf24;
  font-size: 14px;
  letter-spacing: 1px;
}
.stars-empty {
  color: #4b5563;
}

/* Inline review report */
.review-report-form {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed #374151;
}
.review-report-textarea {
  width: 100%;
  min-height: 50px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  font-size: 12px;
  padding: 6px 8px;
}
