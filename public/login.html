<!-- SpotSure/public/login.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Sign in</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* { box-sizing: border-box; }

/* Dark background, matching splash */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Subtle speckles */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(148,163,184,0.2) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(96,165,250,0.18) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 80%, rgba(129,140,248,0.18) 0, transparent 60%);
  opacity: 0.7;
  mix-blend-mode: screen;
  z-index: 0;
}

@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

/* Center container */
.shell {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  z-index: 1;
}

/* Circular card */
.circle-card {
  width: 340px;
  height: 340px;
  border-radius: 50%;
  background:
    radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 55%),
    rgba(15,23,42,0.96);
  border: 1px solid rgba(55,65,81,0.9);
  box-shadow: 0 26px 80px rgba(0,0,0,0.96);
  backdrop-filter: blur(22px);
  padding: 22px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  transform: translateY(12px) scale(0.98);
  opacity: 0;
  animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* Logo + title row */
.circle-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
}

.logo-pill {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at 0 0, #38bdf8 0, #2563eb 40%, #1d4ed8 65%, #020617 100%);
  box-shadow: 0 8px 20px rgba(37,99,235,0.75);
  font-size: 18px;
  color: #eff6ff;
}

.title {
  font-size: 18px;
  font-weight: 700;
  color: #f9fafb;
}

/* Tiny line to separate header and form */
.glow-line {
  height: 1px;
  width: 70%;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.8), transparent);
  opacity: 0.8;
}

/* Form area */
.form {
  width: 100%;
  max-width: 260px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Minimal labels (small and subtle) */
.label {
  font-size: 11px;
  color: #9ca3af;
  margin-bottom: 2px;
}

/* Inputs */
.input-wrap {
  position: relative;
}
.input {
  width: 100%;
  padding: 8px 11px 8px 30px;
  border-radius: 999px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  font-size: 13px;
  outline: none;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
}
.input::placeholder {
  color: #6b7280;
}
.input:focus {
  border-color: #4b5563;
  box-shadow: 0 0 0 1px rgba(55,65,81,0.8);
  background: rgba(15,23,42,1);
}

.input-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  color: #6b7280;
}

/* Primary button */
.btn-primary {
  width: 100%;
  padding: 9px 12px;
  border-radius: 999px;
  border: 1px solid #4b5563;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  background: #020617;
  color: #e5e7eb;
  box-shadow: 0 12px 26px rgba(0,0,0,1);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 34px rgba(0,0,0,1);
  border-color: #6b7280;
}
.btn-primary:active {
  transform: translateY(1px);
  box-shadow: 0 8px 18px rgba(0,0,0,1);
}

/* Entrance animation */
@keyframes cardIn {
  0% { opacity: 0; transform: translateY(18px) scale(0.96); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Slightly tighter on very small screens */
@media (max-width: 380px) {
  .circle-card {
    width: 300px;
    height: 300px;
    padding: 18px 18px;
  }
  .title {
    font-size: 17px;
  }
}
</style>
</head>
<body>
<div class="shell">
  <div class="circle-card">
    <div class="circle-header">
      <div class="logo-pill">S</div>
      <div class="title">Sign in</div>
    </div>

    <div class="glow-line"></div>

    <div class="form">
      <div>
        <div class="label">Name</div>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="userName" class="input" type="text" placeholder="Your name" />
        </div>
      </div>

      <div>
        <div class="label">Email</div>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input id="userEmail" class="input" type="email" placeholder="you@example.com" />
        </div>
      </div>

      <button class="btn-primary" type="button" onclick="saveProfileAndEnter()">
        Continue
      </button>
    </div>
  </div>
</div>

<script>
function saveProfileAndEnter() {
  const nameEl = document.getElementById('userName');
  const emailEl = document.getElementById('userEmail');

  const name = (nameEl.value || '').trim();
  const email = (emailEl.value || '').trim();

  if (!name || !email) {
    alert('Please enter your name and email.');
    return;
  }

  localStorage.setItem('spotsureUsername', name);
  localStorage.setItem('spotsureUserEmail', email);

  window.location.href = '/services.html';
}

// Prefill from splash
(function prefillIfExists() {
  const storedName = localStorage.getItem('spotsureUsername');
  const storedEmail = localStorage.getItem('spotsureUserEmail');
  if (storedName || storedEmail) {
    const nameEl = document.getElementById('userName');
    const emailEl = document.getElementById('userEmail');
    if (storedName) nameEl.value = storedName;
    if (storedEmail) emailEl.value = storedEmail;
  }
})();
</script>
</body>
</html>
