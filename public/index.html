<!--SpotSure/public/index.html-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Discover. Decide. Trust.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script
  src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
  type="module"
></script>

<style>
* { box-sizing: border-box; }

/* GLOBAL THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
}

/* Background image layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/bg1.jpg") center center / cover no-repeat;
  opacity: 0.35;
  z-index: -2;
}

/* Speckle layer */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(3px 3px at 18% 24%, rgba(37,99,235,0.28) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(79,70,229,0.16) 0, transparent 60%);
  opacity: 0.55;
  mix-blend-mode: screen;
  z-index: -1;
}

@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.app-shell {
  max-width: 520px;
  width: 100%;
  padding: 26px 18px 24px;
  position: relative;
  z-index: 1;
}

/* === SPLASH: circular layout === */

#splashView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}

/* Circle container */
.splash-circle {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 0 0, #1d4ed8 0, #1e40af 32%, #020617 70%);
  box-shadow:
    0 0 40px rgba(37,99,235,0.35),
    0 18px 40px rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Lottie inside the circle – always visible */
.splash-circle dotlottie-wc {
  width: 100%;
  height: 100%;
  opacity: 1;
  filter: none;
}

/* Text overlaid on the circle */
.splash-text-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 26px;
  text-align: center;
  pointer-events: none;
}

.splash-text-overlay span {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #e5e7eb;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

/* === LOGIN VIEW (circular login, responsive) === */

/* Hidden by default; animation handled via .show-login */
#loginView {
  display: none;
  opacity: 0;
}

/* Outer circle container for login */
.circle-login {
  width: 380px;
  height: 380px;
  max-width: 90vw;           /* never exceed viewport width */
  max-height: 90vw;          /* keep it circular on small screens */
  border-radius: 50%;
  background:
    radial-gradient(circle at top right, rgba(59,130,246,0.16), transparent 55%),
    rgba(15,23,42,0.96);
  border: 1px solid rgba(55,65,81,0.9);
  box-shadow: 0 24px 70px rgba(0,0,0,0.96);
  backdrop-filter: blur(22px);
  margin: 0 auto;
  display: flex;
  align-items: center;    /* centers inner content vertically */
  justify-content: center;/* centers inner content horizontally */
}

/* Inner column that holds header + form */
.circle-inner {
  width: 100%;
  max-width: 220px;        /* slightly narrower */
  margin: 0 auto;          /* ensure inner column is centered */

  padding-top: 28px;       /* slightly reduced to center content */
  padding-bottom: 18px;

  display: flex;
  flex-direction: column;
  align-items: center;     /* center header, line, form block */
  justify-content: center;
  gap: 14px;
}

/* Header inside circle */
.circle-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
}

/* App icon in pill */
.logo-pill {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 6px 18px rgba(37,99,235,0.8);
  background: #020617;
}

.logo-pill img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.login-title {
  font-size: 18px;
  font-weight: 700;
  color: #f9fafb;
}

/* Line between header and form */
.glow-line {
  height: 1px;
  width: 70%;
  margin: 6px 0 10px;
  background: linear-gradient(90deg, transparent, rgba(75,85,99,0.95), transparent);
  opacity: 0.85;
}

/* Form layout */
.form {
  width: 100%;
  max-width: 200px;        /* slightly narrower form to center fields visually */
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Input wrapper */
.input-wrap {
  position: relative;
}

/* Text inputs */
input {
  width: 100%;
  /* padding: top right bottom left */
  padding: 10px 14px 10px 32px;  /* reduced left padding */

  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 14px;
  outline: none;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
}

input::placeholder {
  color: #6b7280;
}

input:focus {
  border-color: #4b5563;
  box-shadow: 0 0 0 1px rgba(55,65,81,0.8);
}

/* Left icon inside input */
.input-icon {
  position: absolute;
  left: 10px;              /* slightly reduced */
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: #6b7280;
}

/* buttons */
.btn-primary {
  width: 100%;
  padding: 10px 14px;
  border-radius: 999px;
  border: 1px solid #4b5563;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  background: #020617;
  color: #e5e7eb;
  box-shadow: 0 12px 26px rgba(0,0,0,1);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 34px rgba(0,0,0,1);
  border-color: #6b7280;
}

/* More appealing CTA styling */
.btn-primary.accent {
  background: radial-gradient(circle at 0 0, #38bdf8 0, #2563eb 40%, #1d4ed8 70%, #020617 100%);
  box-shadow:
    0 0 22px rgba(37,99,235,0.75),
    0 14px 30px rgba(0,0,0,1);
}
.btn-primary.accent:hover {
  transform: translateY(-2px) scale(1.01);
  box-shadow:
    0 0 30px rgba(59,130,246,0.9),
    0 18px 38px rgba(0,0,0,1);
  border-color: #6b7280;
}
.btn-primary.accent:active {
  transform: translateY(1px) scale(0.99);
  box-shadow:
    0 0 18px rgba(37,99,235,0.6),
    0 10px 20px rgba(0,0,0,1);
}

/* Show + animate login */
.show-login {
  display: block !important;
  animation: cardInLogin 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes cardInLogin {
  0% { opacity: 0; transform: translateY(22px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 380px) {
  .app-shell { padding: 22px 14px; }
  .circle-login {
    width: 320px;
    height: 320px;
    max-width: 90vw;
    max-height: 90vw;
  }
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- Splash: circular animation with overlay text -->
  <div id="splashView">
    <div class="splash-circle">
      <dotlottie-wc
        src="https://lottie.host/c740163e-18f4-4ec5-8da9-aa6bfd4ac5d3/jmImDUCtrs.lottie"
        autoplay
        loop
      ></dotlottie-wc>
      <div class="splash-text-overlay">
        <span>DISCOVER. DECIDE. TRUST.</span>
      </div>
    </div>
  </div>

  <!-- Circular login (inline) -->
  <div id="loginView" class="circle-login">
    <div class="circle-inner">
      <div class="circle-header">
        <div class="logo-pill">
          <img src="/images/app_icon.jpg" alt="SpotSure icon">
        </div>
        <div class="login-title">Welcome back</div>
      </div>

      <div class="glow-line"></div>

      <div class="form">
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input
            id="userName"
            type="text"
            placeholder="Your name"
          />
        </div>

        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input
            id="userEmail"
            type="email"
            placeholder="you@example.com"
          />
        </div>

        <button class="btn-primary accent" type="button" onclick="saveProfileAndEnter()">
          Continue
        </button>
      </div>
    </div>
  </div>

</div>

<script>
function showLogin() {
  const splash = document.getElementById('splashView');
  const login = document.getElementById('loginView');
  if (!splash || !login) return;

  splash.style.display = 'none';
  login.classList.add('show-login');

  const storedName = localStorage.getItem('spotsureUsername');
  const storedEmail = localStorage.getItem('spotsureUserEmail');
  if (storedName || storedEmail) {
    document.getElementById('userName').value = storedName || '';
    document.getElementById('userEmail').value = storedEmail || '';
  }
}

function saveProfileAndEnter() {
  const nameEl = document.getElementById('userName');
  const emailEl = document.getElementById('userEmail');
  const name = (nameEl.value || '').trim();
  const email = (emailEl.value || '').trim();

  if (!name || !email) {
    alert('Please enter your name and email.');
    return;
  }

  localStorage.setItem('spotsureUsername', name);
  localStorage.setItem('spotsureUserEmail', email);

  window.location.href = '/services.html';
}

document.addEventListener('DOMContentLoaded', () => {
  // Auto transition from splash to login after ~3 seconds
  setTimeout(showLogin, 3000);
});
</script>
</body>
</html>
