<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Discover. Decide. Trust.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script
  src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
  type="module"
></script>

<style>
* { box-sizing: border-box; }

/* GLOBAL THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
}

/* Background image layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/image.jpg") center center / cover no-repeat;
  opacity: 0.35;
  z-index: -2;
}

/* Speckle layer */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(3px 3px at 18% 24%, rgba(37,99,235,0.28) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(79,70,229,0.16) 0, transparent 60%);
  opacity: 0.55;
  mix-blend-mode: screen;
  z-index: -1;
}

@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.app-shell {
  max-width: 520px;
  width: 100%;
  padding: 26px 18px 24px;
  position: relative;
  z-index: 1;
}

/* === SPLASH: circular layout === */

#splashView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  animation: cardFloat 4s ease-in-out infinite;
}
@keyframes cardFloat {
  0% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
  100% { transform: translateY(0); }
}

/* Circle container */
.splash-circle {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 0 0, #1d4ed8 0, #1e40af 32%, #020617 70%);
  box-shadow:
    0 0 40px rgba(37,99,235,0.35),
    0 18px 40px rgba(0,0,0,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Lottie inside the circle – start hidden and blurred */
.splash-circle dotlottie-wc {
  width: 100%;
  height: 100%;
  opacity: 0;
  filter: blur(6px);
  transition: opacity 0.4s ease, filter 0.4s ease;
}

/* Visible state once ready */
.splash-circle dotlottie-wc.ready {
  opacity: 1;
  filter: blur(0);
}

/* Text overlaid on the circle */
.splash-text-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 26px;
  text-align: center;
  pointer-events: none;
}

.splash-text-overlay span {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #e5e7eb;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

/* === LOGIN VIEW === */

#loginView {
  display: none;
  opacity: 0;
  transform: translateY(16px) scale(0.97);
}

/* glass card for login */
.login-card {
  background:
    radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 55%),
    rgba(15,23,42,0.94);
  border-radius: 18px;
  border: 1px solid rgba(55,65,81,0.9);
  box-shadow: 0 26px 80px rgba(0,0,0,0.96);
  backdrop-filter: blur(22px);
  padding: 20px 18px 18px;
}

.login-header {
  margin-bottom: 10px;
}
.login-title {
  font-size: 19px;
  font-weight: 700;
}
.login-sub {
  font-size: 13px;
  color: #9ca3af;
}

.glow-line {
  height: 1px;
  width: 100%;
  margin: 8px 0 18px;
  background: linear-gradient(90deg, transparent, rgba(55,65,81,0.9), transparent);
  opacity: 0.9;
}

/* inputs */
.input-wrap {
  position: relative;
  margin-bottom: 10px;
}
input {
  width: 100%;
  padding: 9px 12px 9px 32px;
  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 13px;
  outline: none;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
}
input::placeholder {
  color: #6b7280;
}
input:focus {
  border-color: #4b5563;
  box-shadow: 0 0 0 1px rgba(55,65,81,0.8);
}
.input-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: #6b7280;
}
.label {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
  display: block;
}

/* buttons */
