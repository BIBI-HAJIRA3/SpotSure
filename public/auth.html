<!-- SpotSure/public/auth.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SpotSure – Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%, #000 100%);
      color: #e5e7eb;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(148,163,184,0.18) 0, transparent 55%),
        radial-gradient(1px 1px at 80% 70%, rgba(148,163,184,0.14) 0, transparent 55%),
        radial-gradient(1.5px 1.5px at 40% 80%, rgba(148,163,184,0.1) 0, transparent 60%);
      opacity: 0.6;
      z-index: -1;
    }
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #f9fafb;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 8px;
    }
    .card {
      background: #0b1120;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 18px 16px 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
    }
    input::placeholder {
      color: #6b7280;
    }
    .avatar-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 4px;
    }
    .avatar-preview {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid #1f2937;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #9ca3af;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .helper {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    .btn-primary {
      width: 100%;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      background: #2563eb;
      color: #ffffff;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15,23,42,0.7);
      background: #1d4ed8;
    }
    #toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #111827;
      color: #e5e7eb;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 60;
      max-width: 90%;
      text-align: left;
      white-space: pre-line;
    }
    #toastMessage { margin-right: 40px; }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <div class="logo">SpotSure</div>
      <div class="subtitle">Create your profile once to keep your services and reviews.</div>
    </div>

    <div class="card">
      <form id="authForm" enctype="multipart/form-data">
        <div class="form-group">
          <label for="name">Name *</label>
          <input id="name" name="name" type="text" required placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input id="password" name="password" type="password" required placeholder="Create a password" />
        </div>

        <div class="form-group">
          <label for="avatar">Profile picture (optional)</label>
          <div class="avatar-wrapper">
            <div id="avatarPreview" class="avatar-preview">👤</div>
            <div style="flex:1;">
              <input id="avatar" name="avatar" type="file" accept="image/*" />
              <div class="helper">You can change this later. Leave empty to use the default icon.</div>
            </div>
          </div>
        </div>

        <button class="btn-primary" type="submit">Continue to SpotSure</button>
      </form>
    </div>
  </div>

  <div id="toast"><span id="toastMessage"></span></div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let toastTimer = null;

    function showToast(message) {
      const t = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      if (!t || !msg) return;
      msg.textContent = message;
      t.style.opacity = '1';
      t.style.pointerEvents = 'auto';
      t.style.transform = 'translateX(-50%) translateY(-4px)';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.pointerEvents = 'none';
        t.style.transform = 'translateX(-50%) translateY(0)';
      }, 2200);
    }

    // avatar preview (client‑side only) [web:209]
    document.getElementById('avatar').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      const preview = document.getElementById('avatarPreview');
      if (!file) {
        preview.innerHTML = '👤';
        return;
      }
      const url = URL.createObjectURL(file);
      preview.innerHTML = '';
      const img = document.createElement('img');
      img.src = url;
      preview.appendChild(img);
    });

    // one‑time signup – store user in localStorage for front‑end use [web:212]
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);

      try {
        const res = await fetch(API_BASE + '/auth/signup', {
          method: 'POST',
          body: data,
          credentials: 'include',
        });
        const json = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(json.message || 'Sign in failed');
          return;
        }

        const user = json.user || json;
        // minimal data for front‑end – you can add more fields as needed
        localStorage.setItem('spotsureUser', JSON.stringify({
          id: user._id,
          name: user.name,
          email: user.email,
          avatarUrl: user.avatarUrl || null,
        }));
        localStorage.setItem('spotsureUsername', user.name || '');

        window.location.href = '/services.html';
      } catch (err) {
        console.error(err);
        showToast('Error signing in');
      }
    });
  </script>
</body>
</html>
