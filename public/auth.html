<!-- SpotSure/public/auth.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SpotSure – Sign in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%, #000 100%);
      color: #e5e7eb;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(148,163,184,0.18) 0, transparent 55%),
        radial-gradient(2px 2px at 80% 70%, rgba(148,163,184,0.14) 0, transparent 55%),
        radial-gradient(1.5px 1.5px at 40% 80%, rgba(148,163,184,0.1) 0, transparent 60%);
      opacity: 0.6;
      z-index: -1;
    }
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #f9fafb;
      text-align: center;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 8px;
    }
    .card {
      background: #0b1120;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 18px 16px 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    .tab-row {
      display: flex;
      border-radius: 999px;
      border: 1px solid #1f2937;
      padding: 2px;
      margin-bottom: 12px;
      background: #020617;
    }
    .tab-btn {
      flex: 1;
      border-radius: 999px;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 13px;
      padding: 6px 0;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #2563eb;
      color: #f9fafb;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
    }
    input::placeholder {
      color: #6b7280;
    }
    .btn-primary {
      width: 100%;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      background: #2563eb;
      color: #ffffff;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15,23,42,0.7);
      background: #1d4ed8;
    }
    .error {
      margin-top: 8px;
      font-size: 12px;
      color: #fecaca;
      min-height: 16px;
    }
    #toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #111827;
      color: #e5e7eb;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 60;
      max-width: 90%;
      text-align: left;
      white-space: pre-line;
    }
    #toastMessage { margin-right: 40px; }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <div class="logo">SpotSure</div>
      <div class="subtitle">Sign in once to manage your services and reviews.</div>
    </div>

    <div class="card">
      <div class="tab-row">
        <button id="tabRegister" class="tab-btn active" type="button">Register</button>
        <button id="tabLogin" class="tab-btn" type="button">Login</button>
      </div>

      <form id="authForm">
        <div class="form-group">
          <label for="username">Username *</label>
          <input id="username" name="username" type="text" required placeholder="Choose a username" />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input id="password" name="password" type="password" required placeholder="Create a password" />
        </div>

        <button class="btn-primary" type="submit" id="submitBtn">
          Create account
        </button>
        <div id="errorBox" class="error"></div>
      </form>
    </div>
  </div>

  <div id="toast"><span id="toastMessage"></span></div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let mode = 'register';
    let toastTimer = null;

    function showToast(message) {
      const t = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      if (!t || !msg) return;
      msg.textContent = message;
      t.style.opacity = '1';
      t.style.pointerEvents = 'auto';
      t.style.transform = 'translateX(-50%) translateY(-4px)';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.pointerEvents = 'none';
        t.style.transform = 'translateX(-50%) translateY(0)';
      }, 2200);
    }

    function setMode(nextMode) {
      mode = nextMode;
      const tabReg = document.getElementById('tabRegister');
      const tabLog = document.getElementById('tabLogin');
      const submitBtn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');

      if (mode === 'register') {
        tabReg.classList.add('active');
        tabLog.classList.remove('active');
        submitBtn.textContent = 'Create account';
      } else {
        tabLog.classList.add('active');
        tabReg.classList.remove('active');
        submitBtn.textContent = 'Sign in';
      }
      errorBox.textContent = '';
    }

    document.getElementById('tabRegister').addEventListener('click', () => setMode('register'));
    document.getElementById('tabLogin').addEventListener('click', () => setMode('login'));

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('errorBox');

      errorBox.textContent = '';

      if (!username || !password) {
        errorBox.textContent = 'Username and password are required.';
        return;
      }

      const endpoint = mode === 'register' ? '/auth/register' : '/auth/login';

      try {
        const res = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          errorBox.textContent = data.message || 'Sign in failed';
          showToast(data.message || 'Sign in failed');
          return;
        }

        const user = data.user;
        if (user) {
          localStorage.setItem('spotsureUser', JSON.stringify({
            id: user.id,
            username: user.username,
          }));
        }

        showToast(mode === 'register' ? 'Account created' : 'Signed in');
        window.location.href = '/services.html';
      } catch (err) {
        console.error(err);
        errorBox.textContent = 'Server error. Please try again.';
        showToast('Server error');
      }
    });
  </script>
</body>
</html>
