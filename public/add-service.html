<!-- SpotSure/public/add-service.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Request service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: radial-gradient(circle at top, #020617 0, #020617 55%, #000 100%);
  color: #e5e7eb;
  position: relative;
  overflow-x: hidden; /* allow vertical scroll */
}

/* Background image layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/image.jpg") center center / cover no-repeat;
  opacity: 0.35;
  z-index: -2;
}

/* Speckle layer (unchanged) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(75,85,99,0.25) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(55,65,81,0.18) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 80%, rgba(31,41,55,0.18) 0, transparent 60%);
  opacity: 0.7;
  z-index: -1;
}
.page {
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 14px 28px;
  min-height: 100vh;
}
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.top-title {
  font-size: 18px;
  font-weight: 600;
  color: #f9fafb;
}
.top-sub {
  font-size: 12px;
  color: #9ca3af;
}
.pill-btn {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #111827;
  color: #e5e7eb;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.pill-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0,0,0,0.9);
  background: #020617;
}
.card {
  background: rgba(15,23,42,0.96);
  border-radius: 14px;
  border: 1px solid #1f2937;
  padding: 14px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.85);
  margin-bottom: 14px;
  backdrop-filter: blur(12px);
}
.form-group {
  margin-bottom: 10px;
}
label {
  display: block;
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
}
input, select, textarea {
  width: 100%;
  padding: 7px 9px;
  border-radius: 9px;
  border: 1px solid #374151;
  background: #020617;
  color: #e5e7eb;
  font-size: 13px;
  outline: none;
}
input::placeholder, textarea::placeholder {
  color: #6b7280;
}
textarea {
  min-height: 70px;
  resize: vertical;
}
.btn-primary {
  padding: 9px 12px;
  border-radius: 999px;
  border: none;
  font-size: 13px;
  cursor: pointer;
  background: linear-gradient(90deg, #020617, #111827);
  color: #ffffff;
  box-shadow: 0 10px 22px rgba(0,0,0,0.9);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 13px 26px rgba(0,0,0,1);
}
.helper {
  font-size: 11px;
  color: #6b7280;
  margin-top: 2px;
}
#toast {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  background: #111827;
  color: #e5e7eb;
  padding: 9px 14px;
  border-radius: 12px;
  font-size: 13px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.8);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 60;
  max-width: 90%;
  text-align: left;
  white-space: pre-line;
}
#toastMessage {
  margin-right: 40px;
}
#customCategoryGroup {
  display: none;
}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div>
      <div class="top-title">Request a service</div>
      <div class="top-sub">Submit details, admin will review and approve.</div>
    </div>
    <button class="pill-btn" type="button" onclick="window.location.href='/services.html'">
      ⬅ Back
    </button>
  </div>

  <div class="card">
    <form id="addServiceForm" enctype="multipart/form-data">
      <div class="form-group">
        <label for="name">Service / organization name *</label>
        <input id="name" name="name" type="text" required placeholder="Eg. City Care Hospital" />
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" name="category" required>
          <option value="">Select category</option>
          <option value="Hospital">Hospital</option>
          <option value="Clinic">Clinic</option>
          <option value="School">School</option>
          <option value="Restaurant">Restaurant</option>
          <option value="Grocery">Grocery</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div id="customCategoryGroup" class="form-group">
        <label for="customCategory">Custom category *</label>
        <input id="customCategory" type="text" placeholder="Eg. Pharmacy, Diagnostic lab" />
      </div>

      <div class="form-group">
        <label for="city">City *</label>
        <input id="city" name="city" type="text" required placeholder="Eg. Hubballi" />
      </div>

      <div class="form-group">
        <label for="pincode">Pincode *</label>
        <input id="pincode" name="pincode" type="text" required placeholder="Eg. 580030" />
      </div>

      <div class="form-group">
        <label for="address">Address *</label>
        <textarea id="address" name="address" required placeholder="Full address as users would search it"></textarea>
      </div>

      <div class="form-group">
        <label>Location (optional)</label>
        <input id="lat" name="lat" type="text" placeholder="Latitude (optional)" />
        <div class="helper">You can paste coordinates if you have them. Otherwise leave blank.</div>
        <input id="lng" name="lng" type="text" placeholder="Longitude (optional)" style="margin-top:6px;" />
      </div>

      <div class="form-group">
        <label for="images">Images (optional, multiple)</label>
        <input id="images" name="images" type="file" accept="image/*" multiple />
        <div class="helper">Add 1–5 photos of the place or service. First image becomes the main icon row.</div>
      </div>

      <button class="btn-primary" type="submit">Submit request</button>
    </form>
  </div>
</div>

<div id="toast">
  <span id="toastMessage"></span>
</div>

<script>
const API_BASE = window.location.origin + '/api';
let toastTimer = null;

function showToast(message) {
  const t = document.getElementById('toast');
  const msg = document.getElementById('toastMessage');
  if (!t || !msg) return;
  msg.textContent = message;
  t.style.opacity = '1';
  t.style.pointerEvents = 'auto';
  t.style.transform = 'translateX(-50%) translateY(-4px)';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.style.opacity = '0';
    t.style.pointerEvents = 'none';
    t.style.transform = 'translateX(-50%) translateY(0)';
  }, 2200);
}

document.getElementById('category').addEventListener('change', () => {
  const category = document.getElementById('category').value;
  const customGroup = document.getElementById('customCategoryGroup');
  if (category === 'Other') {
    customGroup.style.display = 'block';
  } else {
    customGroup.style.display = 'none';
  }
});

document.getElementById('addServiceForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);

  const selectedCategory = document.getElementById('category').value;
  const custom = document.getElementById('customCategory').value.trim();

  if (selectedCategory === 'Other') {
    if (!custom) {
      showToast('Please enter a custom category name.');
      return;
    }
    data.set('category', custom);
  }

  try {
    const res = await fetch(API_BASE + '/services', {
      method: 'POST',
      body: data,
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(json.message || 'Failed to submit service');
      return;
    }
    showToast('Service request submitted. Pending admin approval.');
    setTimeout(() => {
      window.location.href = '/services.html';
    }, 1500);
  } catch (err) {
    console.error(err);
    showToast('Error submitting service');
  }
});
</script>
</body>
</html>
