<!--SpotSure/public/admin-dashboard.html-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotsure Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        position: relative;
        overflow: hidden;
      }

      /* New: background image layer */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: url("/images/back.jpg") center center / cover no-repeat;
        opacity: 0.18;
        z-index: -2;
      }

      .shell {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px 14px 32px;
        position: relative;
        z-index: 1;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .top-title {
        font-size: 20px;
        font-weight: 700;
        color: #f9fafb;
      }
      .top-sub {
        font-size: 12px;
        color: #9ca3af;
      }
      .pill-btn {
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #111827;
        color: #e5e7eb;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .pill-btn.danger {
        border-color: #b91c1c;
        color: #fecaca;
      }
      .card {
        background: #020617;
        border-radius: 14px;
        border: 1px solid #1f2937;
        padding: 14px;
        margin-bottom: 14px;
      }
      h2 {
        font-size: 15px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      .item {
        border-radius: 10px;
        border: 1px solid #1f2937;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: #020617;
      }
      .item-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .item-sub {
        font-size: 12px;
        color: #9ca3af;
      }
      .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        font-size: 12px;
      }
      .btn-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 4px 9px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 12px;
      }
      .btn.primary {
        background: #22c55e;
        color: #052e16;
      }
      .btn.danger {
        background: #ef4444;
        color: #fee2e2;
      }
      .btn.ghost {
        background: #020617;
        border: 1px solid #4b5563;
        color: #e5e7eb;
      }
      .search-bar {
        margin-bottom: 10px;
      }
      .search-input {
        width: 100%;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 13px;
      }
      .small {
        font-size: 11px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="top-bar">
        <div>
          <div class="top-title">Spotsure Admin</div>
          <div class="top-sub">Manage services, reviews, and reports</div>
        </div>
        <button id="logoutBtn" class="pill-btn danger" type="button">
          Log out
        </button>
      </header>

      <!-- Search & delete service by name -->
      <section class="card">
        <h2>Find & delete service</h2>
        <div class="search-bar">
          <input
            id="serviceSearchInput"
            class="search-input"
            type="text"
            placeholder="Type a service name to search"
          />
        </div>
        <div id="serviceSearchResults" class="small">
          Type at least 2 characters to search.
        </div>
      </section>

      <!-- Pending services -->
      <section class="card">
        <h2>Pending service approvals</h2>
        <div id="pendingServices"></div>
      </section>

      <!-- Removal requests -->
      <section class="card">
        <h2>Removal requests</h2>
        <div id="removalRequests"></div>
      </section>

      <!-- Service reports -->
      <section class="card">
        <h2>Reported services</h2>
        <div id="reportedServices"></div>
      </section>

      <!-- Review reports + delete any review -->
      <section class="card">
        <h2>Reported reviews</h2>
        <div id="reportedReviews"></div>
      </section>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";

      async function ensureAdmin() {
        try {
          const res = await fetch(API_BASE + "/admin/me", {
            credentials: "include",
          });
          if (!res.ok) {
            window.location.href = "/admin.html";
            return;
          }
          const data = await res.json().catch(() => ({}));
          if (!data.user || data.user.role !== "admin") {
            window.location.href = "/admin.html";
          }
        } catch (e) {
          window.location.href = "/admin.html";
        }
      }

      async function logout() {
        try {
          await fetch(API_BASE + "/admin/logout", {
            method: "POST",
            credentials: "include",
          });
        } catch (e) {}
        window.location.href = "/admin.html";
      }

      // Pending services
      async function loadPendingServices() {
        const container = document.getElementById("pendingServices");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/services/pending", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No pending services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">Created: ${
                  new Date(s.createdAt).toLocaleString() || ""
                }</span>
                <div class="btn-row">
                  <button class="btn primary" onclick="approveService('${
                    s._id
                  }')">Approve</button>
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading pending services.";
        }
      }

      async function approveService(id) {
        if (!confirm("Approve this service?")) return;
        try {
          await fetch(API_BASE + "/admin/services/" + id + "/approve", {
            method: "PATCH",
            credentials: "include",
          });
          loadPendingServices();
          loadRemovalRequests();
        } catch (e) {
          alert("Error approving service");
        }
      }

      async function deleteService(id) {
        if (!confirm("Delete this service and all its reviews?")) return;
        try {
          await fetch(API_BASE + "/admin/services/" + id, {
            method: "DELETE",
            credentials: "include",
          });
          loadPendingServices();
          loadRemovalRequests();
          searchServicesByName(); // refresh if displayed in search
        } catch (e) {
          alert("Error deleting service");
        }
      }

      // Removal requests
      async function loadRemovalRequests() {
        const container = document.getElementById("removalRequests");
        container.textContent = "Loading...";
        try {
          const res = await fetch(
            API_BASE + "/admin/services/removal-requests",
            {
              credentials: "include",
            }
          );
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No removal requests.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">Removal requested</span>
                <div class="btn-row">
                  <button class="btn primary" onclick="approveService('${
                    s._id
                  }')">Keep</button>
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading removal requests.";
        }
      }

      // Service reports
      async function loadReportedServices() {
        const container = document.getElementById("reportedServices");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/reports/services", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.reports || [];
          if (!list.length) {
            container.textContent = "No reported services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((r) => {
            const s = r.service || {};
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name || "Unknown service"}</div>
              <div class="item-sub">Reason: ${r.reason || ""}</div>
              <div class="item-row">
                <span class="small">Reported at: ${
                  new Date(r.createdAt).toLocaleString() || ""
                }</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete service</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading reported services.";
        }
      }

      // Review reports – delete any review
      async function loadReportedReviews() {
        const container = document.getElementById("reportedReviews");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/reports/reviews", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.reports || [];
          if (!list.length) {
            container.textContent = "No reported reviews.";
            return;
          }
          container.innerHTML = "";
          list.forEach((r) => {
            const review = r.review || {};
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">Rating: ${
                review.rating || "-"
              } – ${review.username || "Anonymous"}</div>
              <div class="item-sub">Comment: ${
                review.comment || ""
              }<br />Reason: ${r.reason || ""}</div>
              <div class="item-row">
                <span class="small">Reported at: ${
                  new Date(r.createdAt).toLocaleString() || ""
                }</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteReview('${
                    review._id
                  }')">Delete review</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading reported reviews.";
        }
      }

      async function deleteReview(id) {
        if (!id) {
          alert("Missing review id");
          return;
        }
        if (!confirm("Delete this review?")) return;
        try {
          await fetch(API_BASE + "/admin/reviews/" + id, {
            method: "DELETE",
            credentials: "include",
          });
          loadReportedReviews();
        } catch (e) {
          alert("Error deleting review");
        }
      }

      // Search services by name to delete
      let searchTimer = null;
      function setupSearch() {
        const input = document.getElementById("serviceSearchInput");
        input.addEventListener("input", () => {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(searchServicesByName, 300);
        });
      }

      async function searchServicesByName() {
        const input = document.getElementById("serviceSearchInput");
        const query = input.value.trim();
        const container = document.getElementById("serviceSearchResults");

        if (query.length < 2) {
          container.textContent = "Type at least 2 characters to search.";
          return;
        }

        container.textContent = "Searching...";
        try {
          const url =
            API_BASE + "/admin/services/search?name=" + encodeURIComponent(query);
          const res = await fetch(url, { credentials: "include" });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error searching.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No matching services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">ID: ${s._id}</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error searching.";
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        await ensureAdmin();
        document
          .getElementById("logoutBtn")
          .addEventListener("click", logout);
        setupSearch();
        loadPendingServices();
        loadRemovalRequests();
        loadReportedServices();
        loadReportedReviews();
      });
    </script>
  </body>
</html>
