<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Admin login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

/* GLOBAL THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #020617, #020617, #020617, #020617);
  background-size: 220% 220%;
  animation: bgShift 16s ease-in-out infinite;
  color: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 25%, rgba(30,64,175,0.3) 0, transparent 55%),
    radial-gradient(1px 1px at 80% 70%, rgba(15,23,42,0.24) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(30,64,175,0.18) 0, transparent 60%);
  opacity: 0.7;
  mix-blend-mode: screen;
  z-index: -1;
}
@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.app-shell {
  max-width: 420px;
  width: 100%;
  padding: 24px 18px 22px;
  position: relative;
  z-index: 1;
}

/* CARD */
.card {
  background: rgba(15,23,42,0.94);
  border-radius: 18px;
  border: 1px solid rgba(55,65,81,0.9);
  box-shadow: 0 24px 55px rgba(0,0,0,1);
  backdrop-filter: blur(22px);
  padding: 18px 16px 16px;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 30px 60px rgba(0,0,0,1);
  border-color: #9ca3af;
}

/* header */
.admin-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.admin-badge {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  background: radial-gradient(circle at 0 0, #1f2937 0, #020617 100%);
  border: 1px solid #4b5563;
}
.admin-title {
  font-size: 18px;
  font-weight: 700;
}
.admin-sub {
  font-size: 12px;
  color: #9ca3af;
}
.glow-line {
  height: 1px;
  width: 100%;
  margin: 8px 0 14px;
  background: linear-gradient(90deg, transparent, rgba(55,65,81,0.9), transparent);
  opacity: 0.9;
}

/* form */
label {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
  display: block;
}
input {
  width: 100%;
  padding: 8px 11px;
  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 13px;
  outline: none;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
}
input::placeholder {
  color: #6b7280;
}
input:focus {
  border-color: #4b5563;
  box-shadow: 0 0 0 1px rgba(55,65,81,0.8);
}
.form-row {
  margin-bottom: 10px;
}

/* buttons */
.btn-primary {
  border-radius: 999px;
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  width: 100%;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,0,1);
  border-color: #6b7280;
}

/* messages */
#adminStatus {
  margin-top: 8px;
  font-size: 12px;
}
#adminStatus.error { color: #f97316; }
</style>
</head>
<body>
<div class="app-shell">
  <div class="card">
    <div class="admin-title-row">
      <div class="admin-badge">🛡️</div>
      <div>
        <div class="admin-title">SpotSure admin</div>
        <div class="admin-sub">Restricted area. Please authenticate.</div>
      </div>
    </div>

    <div class="glow-line"></div>

    <form id="adminLoginForm">
      <div class="form-row">
        <label for="adminUser">Username</label>
        <input id="adminUser" type="text" placeholder="Admin username" required />
      </div>

      <div class="form-row">
        <label for="adminPass">Password</label>
        <input id="adminPass" type="password" placeholder="Password" required />
      </div>

      <button class="btn-primary" type="submit">
        Sign in
      </button>

      <div id="adminStatus"></div>
    </form>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api';

document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const statusEl = document.getElementById('adminStatus');
  statusEl.textContent = '';
  statusEl.className = '';

  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('adminPass').value.trim();
  if (!username || !password) {
    statusEl.textContent = 'Please enter username and password.';
    statusEl.className = 'error';
    return;
  }

  try {
    const res = await fetch(API_BASE + '/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'include',
    });
    if (!res.ok) throw new Error('Login failed');
    window.location.href = '/admin-dashboard.html';
  } catch (err) {
    console.error(err);
    statusEl.textContent = 'Invalid credentials or server error.';
    statusEl.className = 'error';
  }
});
</script>
</body>
</html>
