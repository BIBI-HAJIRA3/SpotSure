<!-- SpotSure/public/admin.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotsure Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      .shell {
        max-width: 900px;
        margin: 0 auto;
        padding: 20px 14px 32px;
      }
      .card {
        background: #020617;
        border-radius: 16px;
        border: 1px solid #1f2937;
        padding: 16px 14px;
        margin-bottom: 16px;
      }
      .login-card {
        max-width: 360px;
        margin: 40px auto;
        background: rgba(15, 23, 42, 0.95);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
        border-radius: 16px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      h2 {
        font-size: 15px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      p.sub {
        margin: 0 0 24px;
        font-size: 13px;
        color: #9ca3af;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #cbd5f5;
      }
      input {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 1px #22c55e33;
      }
      .field {
        margin-bottom: 14px;
      }
      button {
        cursor: pointer;
      }
      .primary-btn {
        width: 100%;
        padding: 9px 12px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(to right, #22c55e, #16a34a);
        color: #022c22;
        font-weight: 600;
        font-size: 14px;
        margin-top: 6px;
      }
      .primary-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .error {
        margin-top: 8px;
        font-size: 13px;
        color: #fca5a5;
        display: none;
      }
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .top-title {
        font-size: 20px;
        font-weight: 700;
        color: #f9fafb;
      }
      .top-sub {
        font-size: 12px;
        color: #9ca3af;
      }
      .pill-btn {
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #111827;
        color: #e5e7eb;
        padding: 6px 10px;
        font-size: 13px;
      }
      .pill-btn.danger {
        border-color: #b91c1c;
        color: #fecaca;
      }
      .item {
        border-radius: 10px;
        border: 1px solid #1f2937;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: #020617;
      }
      .item-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .item-sub {
        font-size: 12px;
        color: #9ca3af;
      }
      .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        font-size: 12px;
      }
      .btn-row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .btn {
        padding: 4px 9px;
        border-radius: 999px;
        border: none;
        font-size: 12px;
      }
      .btn.primary {
        background: #22c55e;
        color: #052e16;
      }
      .btn.danger {
        background: #ef4444;
        color: #fee2e2;
      }
      .small {
        font-size: 11px;
        color: #9ca3af;
      }
      .search-bar {
        margin-bottom: 10px;
      }
      .search-input {
        width: 100%;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 13px;
      }

      /* confirm modal */
      #confirmOverlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      #confirmBox {
        background: #020617;
        border-radius: 12px;
        padding: 14px 16px;
        border: 1px solid #4b5563;
        max-width: 280px;
        width: 90%;
        font-size: 13px;
      }
      #confirmMessage {
        color: #e5e7eb;
        margin-bottom: 10px;
      }
      #confirmButtons {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN VIEW -->
    <div id="loginView" class="login-card card">
      <h1>Admin sign in</h1>
      <p class="sub">Use the Spotsure admin account.</p>

      <form id="admin-form">
        <div class="field">
          <label for="admin-username">Username</label>
          <input id="admin-username" type="text" autocomplete="username" />
        </div>
        <div class="field">
          <label for="admin-password">Password</label>
          <input
            id="admin-password"
            type="password"
            autocomplete="current-password"
          />
        </div>
        <button id="admin-submit" type="submit" class="primary-btn">
          Sign in
        </button>
        <div id="admin-error" class="error"></div>
      </form>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboardView" class="shell" style="display: none">
      <header class="top-bar">
        <div>
          <div class="top-title">Spotsure Admin</div>
          <div class="top-sub">Manage services, reviews, and reports</div>
        </div>
        <button id="logoutBtn" class="pill-btn danger" type="button">
          Log out
        </button>
      </header>

      <section class="card">
        <h2>Find & delete service</h2>
        <div class="search-bar">
          <input
            id="serviceSearchInput"
            class="search-input"
            type="text"
            placeholder="Type a service name to search"
          />
        </div>
        <div id="serviceSearchResults" class="small">
          Type at least 2 characters to search.
        </div>
      </section>

      <section class="card">
        <h2>Pending service approvals</h2>
        <div id="pendingServices"></div>
      </section>

      <section class="card">
        <h2>Removal requests</h2>
        <div id="removalRequests"></div>
      </section>

      <section class="card">
        <h2>Reported services</h2>
        <div id="reportedServices"></div>
      </section>

      <section class="card">
        <h2>Reported reviews</h2>
        <div id="reportedReviews"></div>
      </section>
    </div>

    <!-- in-app confirm dialog -->
    <div id="confirmOverlay">
      <div id="confirmBox">
        <div id="confirmMessage">Are you sure?</div>
        <div id="confirmButtons">
          <button id="confirmCancelBtn" class="btn" style="background:#111827; color:#e5e7eb;">
            Cancel
          </button>
          <button id="confirmOkBtn" class="btn danger">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";

      const loginView = document.getElementById("loginView");
      const dashboardView = document.getElementById("dashboardView");

      function showLogin() {
        loginView.style.display = "block";
        dashboardView.style.display = "none";
      }

      function showDashboard() {
        loginView.style.display = "none";
        dashboardView.style.display = "block";
      }

      // in-app confirm
      let confirmResolve = null;
      function openConfirm(message) {
        return new Promise((resolve) => {
          confirmResolve = resolve;
          document.getElementById("confirmMessage").textContent = message;
          document.getElementById("confirmOverlay").style.display = "flex";
        });
      }
      function closeConfirm() {
        document.getElementById("confirmOverlay").style.display = "none";
        confirmResolve = null;
      }
      document
        .getElementById("confirmCancelBtn")
        .addEventListener("click", () => {
          if (confirmResolve) confirmResolve(false);
          closeConfirm();
        });
      document.getElementById("confirmOkBtn").addEventListener("click", () => {
        if (confirmResolve) confirmResolve(true);
        closeConfirm();
      });

      async function checkAdminOnLoad() {
        try {
          const res = await fetch(API_BASE + "/admin/me", {
            credentials: "include",
          });
          if (!res.ok) {
            showLogin();
            return;
          }
          const data = await res.json().catch(() => ({}));
          if (!data.user || data.user.role !== "admin") {
            showLogin();
            return;
          }
          showDashboard();
          initDashboard();
        } catch (e) {
          showLogin();
        }
      }

      async function adminLogin(event) {
        event.preventDefault();
        const errorBox = document.getElementById("admin-error");
        const submitBtn = document.getElementById("admin-submit");
        errorBox.style.display = "none";

        const username = document
          .getElementById("admin-username")
          .value.trim();
        const password = document.getElementById("admin-password").value;

        if (!username || !password) {
          errorBox.textContent = "Please enter username and password.";
          errorBox.style.display = "block";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";

        try {
          const res = await fetch(API_BASE + "/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            errorBox.textContent = data.message || "Invalid credentials";
            errorBox.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.textContent = "Sign in";
            return;
          }
          showDashboard();
          initDashboard();
        } catch (err) {
          console.error(err);
          errorBox.textContent = "Network error. Please try again.";
          errorBox.style.display = "block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign in";
        }
      }

      async function logout() {
        try {
          await fetch(API_BASE + "/admin/logout", {
            method: "POST",
            credentials: "include",
          });
        } catch (e) {}
        showLogin();
      }

      async function loadPendingServices() {
        const container = document.getElementById("pendingServices");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/services/pending", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No pending services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">Created: ${
                  s.createdAt ? new Date(s.createdAt).toLocaleString() : ""
                }</span>
                <div class="btn-row">
                  <button class="btn primary" onclick="approveService('${
                    s._id
                  }')">Approve</button>
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading pending services.";
        }
      }

      async function approveService(id) {
        const ok = await openConfirm("Approve this service?");
        if (!ok) return;
        try {
          await fetch(API_BASE + "/admin/services/" + id + "/approve", {
            method: "PATCH",
            credentials: "include",
          });
          await loadPendingServices();
          await loadRemovalRequests();
          await loadReportedServices();
          await searchServicesByName();
        } catch (e) {
          alert("Error approving service");
        }
      }

      async function deleteService(id) {
        const ok = await openConfirm(
          "Delete this service and all its reviews?"
        );
        if (!ok) return;
        try {
          await fetch(API_BASE + "/admin/services/" + id, {
            method: "DELETE",
            credentials: "include",
          });
          await loadPendingServices();
          await loadRemovalRequests();
          await loadReportedServices();
          await searchServicesByName();
        } catch (e) {
          alert("Error deleting service");
        }
      }

      async function loadRemovalRequests() {
        const container = document.getElementById("removalRequests");
        container.textContent = "Loading...";
        try {
          const res = await fetch(
            API_BASE + "/admin/services/removal-requests",
            { credentials: "include" }
          );
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No removal requests.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">Removal requested</span>
                <div class="btn-row">
                  <button class="btn primary" onclick="approveService('${
                    s._id
                  }')">Keep</button>
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading removal requests.";
        }
      }

      async function loadReportedServices() {
        const container = document.getElementById("reportedServices");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/reports/services", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.reports || [];
          if (!list.length) {
            container.textContent = "No reported services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((r) => {
            const s = r.service || {};
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name || "Unknown service"}</div>
              <div class="item-sub">Reason: ${r.reason || ""}</div>
              <div class="item-row">
                <span class="small">Reported at: ${
                  r.createdAt ? new Date(r.createdAt).toLocaleString() : ""
                }</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete service</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading reported services.";
        }
      }

      async function loadReportedReviews() {
        const container = document.getElementById("reportedReviews");
        container.textContent = "Loading...";
        try {
          const res = await fetch(API_BASE + "/admin/reports/reviews", {
            credentials: "include",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error loading.";
            return;
          }
          const list = data.reports || [];
          if (!list.length) {
            container.textContent = "No reported reviews.";
            return;
          }
          container.innerHTML = "";
          list.forEach((r) => {
            const review = r.review || {};
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">Rating: ${
                review.rating || "-"
              } – ${review.username || "Anonymous"}</div>
              <div class="item-sub">Comment: ${
                review.comment || ""
              }<br />Reason: ${r.reason || ""}</div>
              <div class="item-row">
                <span class="small">Reported at: ${
                  r.createdAt ? new Date(r.createdAt).toLocaleString() : ""
                }</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteReview('${
                    review._id
                  }')">Delete review</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error loading reported reviews.";
        }
      }

      async function deleteReview(id) {
        if (!id) {
          alert("Missing review id");
          return;
        }
        const ok = await openConfirm("Delete this review?");
        if (!ok) return;
        try {
          await fetch(API_BASE + "/admin/reviews/" + id, {
            method: "DELETE",
            credentials: "include",
          });
          // re-fetch list so the report disappears
          await loadReportedReviews();
        } catch (e) {
          alert("Error deleting review");
        }
      }

      let searchTimer = null;
      function setupSearch() {
        const input = document.getElementById("serviceSearchInput");
        input.addEventListener("input", () => {
          if (searchTimer) clearTimeout(searchTimer);
          searchTimer = setTimeout(searchServicesByName, 300);
        });
      }

      async function searchServicesByName() {
        const input = document.getElementById("serviceSearchInput");
        const query = input.value.trim();
        const container = document.getElementById("serviceSearchResults");

        if (query.length < 2) {
          container.textContent = "Type at least 2 characters to search.";
          return;
        }

        container.textContent = "Searching...";
        try {
          const url =
            API_BASE +
            "/admin/services/search?name=" +
            encodeURIComponent(query);
          const res = await fetch(url, { credentials: "include" });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            container.textContent = data.message || "Error searching.";
            return;
          }
          const list = data.services || [];
          if (!list.length) {
            container.textContent = "No matching services.";
            return;
          }
          container.innerHTML = "";
          list.forEach((s) => {
            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
              <div class="item-title">${s.name}</div>
              <div class="item-sub">${s.category || ""} • ${
              s.city || ""
            } • PIN ${s.pincode || ""}</div>
              <div class="item-row">
                <span class="small">ID: ${s._id}</span>
                <div class="btn-row">
                  <button class="btn danger" onclick="deleteService('${
                    s._id
                  }')">Delete</button>
                </div>
              </div>
            `;
            container.appendChild(div);
          });
        } catch (e) {
          container.textContent = "Error searching.";
        }
      }

      function initDashboard() {
        document.getElementById("logoutBtn").addEventListener("click", logout);
        setupSearch();
        loadPendingServices();
        loadRemovalRequests();
        loadReportedServices();
        loadReportedReviews();
      }

      document
        .getElementById("admin-form")
        .addEventListener("submit", adminLogin);

      document.addEventListener("DOMContentLoaded", checkAdminOnLoad);
    </script>
  </body>
</html>
