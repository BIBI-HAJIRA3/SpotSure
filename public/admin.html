<!--SpotSure/public/admin.html-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotsure Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: #e5e7eb;
      }
      .card {
        background: rgba(15, 23, 42, 0.95);
        border-radius: 16px;
        padding: 32px 28px;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(16px);
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
        color: #f9fafb;
      }
      p.sub {
        margin: 0 0 24px;
        font-size: 13px;
        color: #9ca3af;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #cbd5f5;
      }
      input {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 1px #22c55e33;
      }
      .field {
        margin-bottom: 14px;
      }
      button {
        width: 100%;
        padding: 9px 12px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(to right, #22c55e, #16a34a);
        color: #022c22;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        margin-top: 6px;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .error {
        margin-top: 8px;
        font-size: 13px;
        color: #fca5a5;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin sign in</h1>
      <p class="sub">Use the Spotsure admin account.</p>

      <form id="admin-form">
        <div class="field">
          <label for="admin-username">Username</label>
          <input
            id="admin-username"
            type="text"
            autocomplete="username"
            value="admin"
          />
        </div>
        <div class="field">
          <label for="admin-password">Password</label>
          <input
            id="admin-password"
            type="password"
            autocomplete="current-password"
            value="Admin123"
          />
        </div>
        <button id="admin-submit" type="submit">Sign in</button>
        <div id="admin-error" class="error"></div>
      </form>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";
      const form = document.getElementById("admin-form");
      const submitBtn = document.getElementById("admin-submit");
      const errorBox = document.getElementById("admin-error");

      async function adminLogin(event) {
        event.preventDefault();
        errorBox.style.display = "none";
        const username = document
          .getElementById("admin-username")
          .value.trim();
        const password = document.getElementById("admin-password").value;

        if (!username || !password) {
          errorBox.textContent = "Please enter username and password.";
          errorBox.style.display = "block";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";

        try {
          const res = await fetch(`${API_BASE}/admin/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
            credentials: "include",
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            errorBox.textContent = data.message || "Invalid credentials";
            errorBox.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.textContent = "Sign in";
            return;
          }

          window.location.href = "/admin-dashboard.html";
        } catch (err) {
          console.error(err);
          errorBox.textContent = "Network error. Please try again.";
          errorBox.style.display = "block";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign in";
        }
      }

      form.addEventListener("submit", adminLogin);
    </script>
  </body>
</html>
