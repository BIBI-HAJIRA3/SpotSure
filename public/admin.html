<!-- SpotSure/public/admin.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SpotSure – Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
  />

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #020617 url('/images/bg-pattern.png') repeat;
      background-attachment: fixed;
      color: #e5e7eb;
    }

    .app-shell {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 14px 28px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .top-title {
      font-size: 20px;
      font-weight: 700;
      color: #f9fafb;
    }
    .top-sub {
      font-size: 12px;
      color: #9ca3af;
    }

    .card {
      background: #111827;
      border-radius: 14px;
      border: 1px solid #1f2937;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
      margin-bottom: 14px;
    }

    .label-small {
      display: block;
      font-size: 12px;
      margin-top: 6px;
      margin-bottom: 2px;
      color: #e5e7eb;
    }
    .input-field {
      width: 100%;
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: #2563eb;
      color: #ffffff;
    }
    .btn-danger {
      background: #b91c1c;
      color: #ffffff;
    }
    .btn-outline {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
    }

    .service-card {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #020617;
      font-size: 13px;
    }
    .service-title {
      font-size: 14px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 2px;
    }
    .service-meta {
      font-size: 12px;
      color: #9ca3af;
    }
    .thumb-row {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .thumb-row img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid #4b5563;
      cursor: pointer;
    }
    .card-actions {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #111827;
      color: #e5e7eb;
      padding: 9px 14px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 60;
      max-width: 90%;
      text-align: left;
      white-space: pre-line;
    }
    #toastMessage {
      margin-right: 40px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <div class="top-title">SpotSure Admin</div>
        <div class="top-sub" id="adminStatusText">Please log in as admin.</div>
      </div>
    </header>

    <!-- Admin login card -->
    <section class="card" id="adminLoginCard">
      <h2 style="margin:0 0 8px; font-size:15px; color:#f9fafb;">Admin login</h2>
      <label class="label-small">Username</label>
      <input id="adminUsername" class="input-field" placeholder="Admin username" />
      <label class="label-small">Password</label>
      <input id="adminPassword" class="input-field" type="password" placeholder="Password" />
      <button class="btn btn-primary" type="button" onclick="adminLogin()">
        <i class="fa fa-sign-in"></i>
        <span>Login</span>
      </button>
    </section>

    <!-- Pending services -->
    <section class="card" id="pendingServicesCard" style="display:none;">
      <h2 style="margin:0 0 8px; font-size:15px; color:#f9fafb;">Pending services</h2>
      <div id="pendingServicesContainer" style="font-size:13px;"></div>
    </section>

    <!-- Removal requests -->
    <section class="card" id="removalRequestsCard" style="display:none;">
      <h2 style="margin:0 0 8px; font-size:15px; color:#f9fafb;">Removal requests</h2>
      <div id="removalRequestsContainer" style="font-size:13px;"></div>
    </section>
  </div>

  <div id="toast">
    <span id="toastMessage"></span>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    let toastTimer = null;

    function showToast(message) {
      const t = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      if (!t || !msg) return;
      msg.textContent = message;
      t.style.opacity = '1';
      t.style.pointerEvents = 'auto';
      t.style.transform = 'translateX(-50%) translateY(-4px)';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.pointerEvents = 'none';
        t.style.transform = 'translateX(-50%) translateY(0)';
      }, 2000);
    }

    async function adminLogin() {
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      if (!username || !password) {
        showToast('Enter username and password.');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.message || 'Admin login failed');
          return;
        }
        document.getElementById('adminStatusText').textContent =
          'Logged in as ' + (data.user?.displayName || data.user?.username || 'admin');
        document.getElementById('adminLoginCard').style.display = 'none';
        document.getElementById('pendingServicesCard').style.display = 'block';
        document.getElementById('removalRequestsCard').style.display = 'block';
        loadPendingServices();
        loadRemovalRequests();
      } catch (err) {
        console.error(err);
        showToast('Error during login');
      }
    }

    function renderServiceCard(s, container, actionsHtml) {
      const div = document.createElement('div');
      div.className = 'service-card';

      let thumbs = '';
      const imgs = s.providerImages || [];
      if (imgs.length > 0) {
        thumbs =
          '<div class="thumb-row">' +
          imgs
            .slice(0, 4)
            .map(
              (u) =>
                `<img src="${u}" onclick="window.open('${u}', '_blank')" />`
            )
            .join('') +
          '</div>';
      }

      div.innerHTML = `
        <div class="service-title">${s.name || 'Service'}</div>
        <div class="service-meta">
          ${(s.category || 'Service')} • ${(s.city || '')} ${(s.pincode ? ' • PIN ' + s.pincode : '')}
        </div>
        <div class="service-meta">${s.address || ''}</div>
        ${thumbs}
        <div class="card-actions">
          ${actionsHtml}
        </div>
      `;
      container.appendChild(div);
    }

    async function loadPendingServices() {
      const container = document.getElementById('pendingServicesContainer');
      container.innerHTML = 'Loading...';
      try {
        const res = await fetch(API_BASE + '/admin/services/pending', {
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({ services: [] }));
        const services = data.services || [];
        if (!services.length) {
          container.innerHTML = '<p style="font-size:12px; color:#9ca3af;">No pending services.</p>';
          return;
        }
        container.innerHTML = '';
        services.forEach((s) => {
          const actionsHtml = `
            <button class="btn btn-primary" type="button" onclick="approveService('${s._id}')">
              <i class="fa fa-check"></i>
              <span>Approve</span>
            </button>
            <button class="btn btn-danger" type="button" onclick="deleteServiceAdmin('${s._id}')">
              <i class="fa fa-trash"></i>
              <span>Delete</span>
            </button>
          `;
          renderServiceCard(s, container, actionsHtml);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p style="font-size:12px; color:#f97316;">Error loading pending services.</p>';
      }
    }

    async function loadRemovalRequests() {
      const container = document.getElementById('removalRequestsContainer');
      container.innerHTML = 'Loading...';
      try {
        const res = await fetch(API_BASE + '/admin/services/removal-requests', {
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({ services: [] }));
        const services = data.services || [];
        if (!services.length) {
          container.innerHTML =
            '<p style="font-size:12px; color:#9ca3af;">No removal requests.</p>';
          return;
        }
        container.innerHTML = '';
        services.forEach((s) => {
          const actionsHtml = `
            <button class="btn btn-danger" type="button" onclick="deleteServiceAdmin('${s._id}')">
              <i class="fa fa-trash"></i>
              <span>Remove</span>
            </button>
          `;
          renderServiceCard(s, container, actionsHtml);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML =
          '<p style="font-size:12px; color:#f97316;">Error loading removal requests.</p>';
      }
    }

    async function approveService(id) {
      try {
        const res = await fetch(API_BASE + '/admin/services/' + id + '/approve', {
          method: 'PATCH',
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.message || 'Failed to approve service');
          return;
        }
        showToast('Service approved');
        loadPendingServices();
      } catch (err) {
        console.error(err);
        showToast('Error approving service');
      }
    }

    async function deleteServiceAdmin(id) {
      if (!confirm('Are you sure you want to delete this service?')) return;
      try {
        const res = await fetch(API_BASE + '/admin/services/' + id, {
          method: 'DELETE',
          credentials: 'include',
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast(data.message || 'Failed to delete service');
          return;
        }
        showToast('Service deleted');
        loadPendingServices();
        loadRemovalRequests();
      } catch (err) {
        console.error(err);
        showToast('Error deleting service');
      }
    }
  </script>
</body>
</html>
