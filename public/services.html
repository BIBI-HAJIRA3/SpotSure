<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SpotSure – Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
  />

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-image: url("https://images.pexels.com/photos/35385537/pexels-photo-35385537.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #e5e7eb;
    }

    .app-shell {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 14px 28px;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .top-title {
      font-size: 20px;
      font-weight: 700;
      color: #f9fafb;
    }
    .top-sub {
      font-size: 12px;
      color: #9ca3af;
    }

    .pill-btn {
      border: 1px solid #2563eb;
      background: #2563eb;
      color: #ffffff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .pill-btn:hover {
      background: #1d4ed8;
    }

    .search-section {
      margin-bottom: 10px;
    }
    .search-input {
      width: 100%;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid #374151;
      font-size: 13px;
      outline: none;
      background: #020617;
      color: #e5e7eb;
    }
    .search-input::placeholder {
      color: #6b7280;
    }

    .helper-text {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
      margin-top: 4px;
    }

    .chip-row {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      padding: 4px 0 10px;
    }
    .chip-row::-webkit-scrollbar {
      display: none;
    }
    .chip {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid #374151;
      font-size: 12px;
      background: #020617;
      color: #d1d5db;
      cursor: pointer;
    }
    .chip.active {
      border-color: #2563eb;
      background: #2563eb;
      color: #ffffff;
    }

    .list-section-title {
      margin: 8px 0;
      font-size: 14px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .services-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .service-card {
      display: flex;
      gap: 12px;
      background: #111827;
      border-radius: 14px;
      padding: 13px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.6);
      cursor: pointer;
      border: 1px solid #1f2937;
      position: relative;
      align-items: center;
    }

    .service-sign {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      color: #0f172a;
      box-shadow: 0 0 10px rgba(15, 23, 42, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: sign-pulse 1.8s ease-in-out infinite;
    }

    .service-sign--hospital {
      background: linear-gradient(135deg, #bbf7d0, #6ee7b7);
    }
    .service-sign--clinic {
      background: linear-gradient(135deg, #a5f3fc, #67e8f9);
    }
    .service-sign--college {
      background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
    }
    .service-sign--school {
      background: linear-gradient(135deg, #fef9c3, #fde68a);
    }
    .service-sign--restaurant {
      background: linear-gradient(135deg, #fed7aa, #fdba74);
    }
    .service-sign--grocery {
      background: linear-gradient(135deg, #bbf7d0, #a7f3d0);
    }
    .service-sign--default {
      background: linear-gradient(135deg, #e5e7eb, #d1d5db);
    }

    .service-card:hover .service-sign {
      transform: scale(1.1);
      box-shadow: 0 0 18px rgba(15, 23, 42, 0.6);
    }

    @keyframes sign-pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .service-info h3 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #f9fafb;
    }
    .service-info p {
      margin: 0;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.3;
    }
    .rating-row-mini {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      font-size: 11px;
      color: #9ca3af;
    }

    #toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: #111827;
      color: #e5e7eb;
      padding: 10px 12px 8px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 60;
      max-width: 90%;
      text-align: left;
      white-space: pre-line;
    }
    #toastMessage {
      margin-right: 60px;
    }
    #toastOkBtn {
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #2563eb;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      float: right;
    }

    @media (min-width: 600px) {
      .app-shell {
        padding: 22px 18px 30px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <div class="top-title">SpotSure</div>
        <div class="top-sub" id="welcomeUserLine"></div>
      </div>
      <div style="display:flex; gap:6px;">
        <button class="pill-btn" type="button" onclick="window.location.href='/add-service.html'">
          + Add
        </button>
      </div>
    </header>

    <section class="search-section">
      <input
        id="searchInput"
        class="search-input"
        type="text"
        placeholder="Search by name, city, pincode, or category..."
      />
    </section>

    <div class="helper-text">Filter by category</div>
    <div class="chip-row">
      <button class="chip active category-btn" data-category="All">All</button>
      <button class="chip category-btn" data-category="Hospital">Hospitals</button>
      <button class="chip category-btn" data-category="Clinic">Clinics</button>
      <button class="chip category-btn" data-category="School">Schools</button>
      <button class="chip category-btn" data-category="College">Colleges</button>
      <button class="chip category-btn" data-category="Restaurant">Restaurants</button>
      <button class="chip category-btn" data-category="Grocery">Grocery</button>
    </div>

    <div class="list-section-title"></div>
    <div id="services" class="services-list"></div>
  </div>

  <div id="toast">
    <div id="toastMessage"></div>
    <button id="toastOkBtn">OK</button>
    <div style="clear:both;"></div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    let allServices = [];
    let currentCategory = 'All';

    function showToast(message) {
      const t = document.getElementById('toast');
      const msg = document.getElementById('toastMessage');
      const ok = document.getElementById('toastOkBtn');
      if (!t || !msg || !ok) return;
      msg.textContent = message;
      t.style.opacity = '1';
      t.style.pointerEvents = 'auto';
      t.style.transform = 'translateX(-50%) translateY(-4px)';
      ok.onclick = () => {
        t.style.opacity = '0';
        t.style.pointerEvents = 'none';
        t.style.transform = 'translateX(-50%) translateY(0)';
      };
    }

    function getUsername() {
      return localStorage.getItem('spotsureUsername') || null;
    }
    function updateUserLine() {
      const line = document.getElementById('welcomeUserLine');
      const name = getUsername();
      if (!line) return;
      line.textContent = name ? 'Welcome back, ' + name : '';
    }

    function getCategorySign(category) {
      const c = (category || '').toLowerCase();

      if (c === 'hospital') return '+';
      if (c === 'clinic') return 'C';

      if (c === 'college' || c === 'university') return '🏛️';
      if (c === 'school') return '📚';

      if (c === 'restaurant') return '🍽';
      if (c === 'grocery') return '🛒';
      return '•';
    }

    function getSignClass(category) {
      const c = (category || '').toLowerCase();
      if (c === 'hospital') return 'service-sign--hospital';
      if (c === 'clinic') return 'service-sign--clinic';
      if (c === 'college' || c === 'university') return 'service-sign--college';
      if (c === 'school') return 'service-sign--school';
      if (c === 'restaurant') return 'service-sign--restaurant';
      if (c === 'grocery') return 'service-sign--grocery';
      return 'service-sign--default';
    }

    function buildRatingText(s) {
      const avg = Number(s.averageRating || 0).toFixed(1);
      const ratingsCount = Number(s.ratingCount || 0);
      const reviewsCount = Number(s.reviewCount || 0);
      const ratingsLabel = ratingsCount === 1 ? '1 rating' : ratingsCount + ' ratings';
      const reviewsLabel =
        reviewsCount === 0 ? 'No reviews' :
        reviewsCount === 1 ? '1 review' : reviewsCount + ' reviews';
      return avg + ' ★ • ' + ratingsLabel + ' • ' + reviewsLabel;
    }

    function filterServices() {
      const searchInput = document.getElementById('searchInput');
      const searchText = searchInput ? searchInput.value.trim().toLowerCase() : '';
      return allServices.filter((s) => {
        const matchesCategory =
          currentCategory === 'All' ||
          (s.category && s.category.toLowerCase() === currentCategory.toLowerCase());
        if (!matchesCategory) return false;
        if (!searchText) return true;
        const fields = [
          s.name || '',
          s.city || '',
          s.pincode || '',
          s.category || '',
        ].map((x) => String(x).toLowerCase());
        return fields.some((f) => f.includes(searchText));
      });
    }

    function openServicePage(serviceId) {
      window.location.href = '/service.html?id=' + encodeURIComponent(serviceId);
    }

    function renderServices() {
      const container = document.getElementById('services');
      container.innerHTML = '';
      const services = filterServices();
      if (!services.length) {
        container.innerHTML = '<p style="font-size:13px; color:#9ca3af;">No services found.</p>';
        return;
      }
      services.forEach((s) => {
        const card = document.createElement('div');
        card.className = 'service-card';
        card.addEventListener('click', () => openServicePage(s._id));

        const signEl = document.createElement('div');
        signEl.className = 'service-sign ' + getSignClass(s.category);
        signEl.textContent = getCategorySign(s.category);

        const info = document.createElement('div');
        info.className = 'service-info';
        const ratingText = buildRatingText(s);
        info.innerHTML = `
          <h3>${s.name}</h3>
          <p>${s.category || 'Service'} • ${s.city || ''}</p>
          <div class="rating-row-mini">
            <span>${ratingText}</span>
          </div>
        `;

        card.appendChild(signEl);
        card.appendChild(info);
        container.appendChild(card);
      });
    }

    async function loadServices() {
      try {
        const res = await fetch(API_BASE + '/services');
        if (!res.ok) throw new Error('Failed to load services');
        const data = await res.json();
        allServices = Array.isArray(data.services) ? data.services : [];
        renderServices();
      } catch (err) {
        console.error(err);
        const container = document.getElementById('services');
        container.innerHTML =
          '<p style="font-size:13px; color:#f97316;">Error loading services.</p>';
      }
    }

    function setupCategoryFilters() {
      const buttons = document.querySelectorAll('.category-btn');
      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          buttons.forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = btn.getAttribute('data-category');
          renderServices();
        });
      });
    }

    function setupSearch() {
      const input = document.getElementById('searchInput');
      if (input) {
        input.addEventListener('input', () => renderServices());
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateUserLine();
      loadServices();
      setupCategoryFilters();
      setupSearch();
    });
  </script>
</body>
</html>
