<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotsure | Services</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px;
      }
      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        gap: 12px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
      }
      .toolbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Small dropdown button */
      .sort-dropdown {
        position: relative;
      }
      .sort-button {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }
      .sort-button svg {
        width: 14px;
        height: 14px;
      }
      .sort-menu {
        position: absolute;
        right: 0;
        margin-top: 4px;
        background: #020617;
        border-radius: 8px;
        border: 1px solid #4b5563;
        min-width: 140px;
        padding: 4px 0;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.8);
        display: none;
        z-index: 20;
      }
      .sort-menu.open {
        display: block;
      }
      .sort-menu button {
        width: 100%;
        border: none;
        background: transparent;
        color: #e5e7eb;
        font-size: 13px;
        padding: 6px 10px;
        text-align: left;
        cursor: pointer;
      }
      .sort-menu button:hover {
        background: #111827;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .service-card {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #1f2937;
        background: #020617;
      }
      .service-name {
        font-size: 15px;
        font-weight: 500;
      }
      .service-meta {
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="toolbar">
        <div class="title">Services</div>

        <div class="toolbar-right">
          <!-- small dropdown button for highest/lowest ranking -->
          <div class="sort-dropdown">
            <button id="sort-btn" class="sort-button" type="button">
              <!-- small sort icon -->
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path
                  d="M7 6h10M7 12h6M7 18h2"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span>Ranking</span>
            </button>
            <div id="sort-menu" class="sort-menu">
              <button type="button" id="sort-highest">Highest ranking</button>
              <button type="button" id="sort-lowest">Lowest ranking</button>
            </div>
          </div>
        </div>
      </div>

      <div id="services-list" class="list"></div>
    </div>

    <script>
      const API_BASE = window.location.origin + "/api";
      const servicesList = document.getElementById("services-list");

      async function loadServices() {
        const res = await fetch(`${API_BASE}/services`);
        const data = await res.json();
        if (!res.ok) {
          console.error(data);
          return;
        }
        window.__services = data || [];
        renderServices(window.__services);
      }

      function renderServices(services) {
        servicesList.innerHTML = "";
        services.forEach((s) => {
          const card = document.createElement("div");
          card.className = "service-card";
          card.innerHTML = `
            <div class="service-name">${s.name || ""}</div>
            <div class="service-meta">
              ${s.city || ""} • ${s.pincode || ""} • Rating: ${
            s.avgRating ?? "N/A"
          }
            </div>
          `;
          card.addEventListener("click", () => {
            window.location.href = `/service.html?id=${s._id}`;
          });
          servicesList.appendChild(card);
        });
      }

      function sortByHighestRating() {
        if (!Array.isArray(window.__services)) return;
        const sorted = [...window.__services].sort((a, b) => {
          const ra = a.avgRating ?? 0;
          const rb = b.avgRating ?? 0;
          return rb - ra;
        });
        renderServices(sorted);
      }

      function sortByLowestRating() {
        if (!Array.isArray(window.__services)) return;
        const sorted = [...window.__services].sort((a, b) => {
          const ra = a.avgRating ?? 0;
          const rb = b.avgRating ?? 0;
          return ra - rb;
        });
        renderServices(sorted);
      }

      // Dropdown behaviour
      const sortBtn = document.getElementById("sort-btn");
      const sortMenu = document.getElementById("sort-menu");
      const sortHighest = document.getElementById("sort-highest");
      const sortLowest = document.getElementById("sort-lowest");

      sortBtn.addEventListener("click", () => {
        sortMenu.classList.toggle("open");
      });

      sortHighest.addEventListener("click", () => {
        sortByHighestRating();
        sortMenu.classList.remove("open");
      });

      sortLowest.addEventListener("click", () => {
        sortByLowestRating();
        sortMenu.classList.remove("open");
      });

      document.addEventListener("click", (e) => {
        if (!sortBtn.contains(e.target) && !sortMenu.contains(e.target)) {
          sortMenu.classList.remove("open");
        }
      });

      loadServices();
    </script>
  </body>
</html>
