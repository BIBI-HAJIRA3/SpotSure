<!-- SpotSure/public/service.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SpotSure – Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%, #000 100%);
      color: #e5e7eb;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(148,163,184,0.18) 0, transparent 55%),
        radial-gradient(2px 2px at 80% 70%, rgba(148,163,184,0.14) 0, transparent 55%),
        radial-gradient(1.5px 1.5px at 40% 80%, rgba(148,163,184,0.1) 0, transparent 60%);
      opacity: 0.6;
      z-index: -1;
    }

    .shell {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 14px 28px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
    }
    .top-title {
      font-size: 18px;
      font-weight: 700;
      color: #f9fafb;
    }
    .top-sub {
      font-size: 12px;
      color: #9ca3af;
    }
    .back-btn {
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .card {
      background: #020617;
      border-radius: 16px;
      border: 1px solid #1f2937;
      padding: 16px 14px 14px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    }

    .service-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .service-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #f9fafb;
      flex-shrink: 0;
      background: radial-gradient(circle at 0 0, #6366f1 0, #4f46e5 35%, #312e81 65%, #0f172a 100%);
      box-shadow: 0 4px 12px rgba(30,64,175,0.9);
    }
    .service-name {
      font-size: 16px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 4px;
    }
    .service-meta {
      font-size: 12px;
      color: #9ca3af;
    }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 12px;
      color: #9ca3af;
    }
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(34,197,94,0.14);
      color: #bbf7d0;
      font-size: 11px;
    }
    .rating-badge .star {
      color: #fbbf24;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #f9fafb;
      margin-bottom: 6px;
    }
    .section-text {
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.4;
    }

    /* Request removal button */
    .remove-btn {
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid #f97316;
      background: #111827;
      color: #fed7aa;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .remove-btn span.icon {
      font-size: 14px;
    }

    .reviews {
      font-size: 12px;
      color: #d1d5db;
    }
    .review-item {
      border-top: 1px solid #1f2937;
      padding-top: 6px;
      margin-top: 6px;
    }
    .review-author {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 2px;
    }
    .review-text {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top-bar">
      <div>
        <div class="top-title" id="serviceNameTop">Service</div>
        <div class="top-sub" id="serviceCityTop"></div>
      </div>
      <button class="back-btn" type="button" onclick="window.location.href='/services.html'">
        ← Back
      </button>
    </header>

    <section class="card">
      <div class="service-header">
        <div class="service-icon" id="serviceIcon">⭐</div>
        <div>
          <div class="service-name" id="serviceName"></div>
          <div class="service-meta" id="serviceMeta"></div>
        </div>
      </div>

      <div class="rating-row">
        <span class="rating-badge">
          <span class="star">★</span>
          <span id="ratingValue">New</span>
        </span>
        <span id="ratingCounts"></span>
      </div>

      <!-- Request removal button -->
      <button id="requestRemovalBtn" class="remove-btn" type="button">
        <span class="icon">⚠️</span>
        <span>Request service removal</span>
      </button>
    </section>

    <section class="card">
      <div class="section-title">About this place</div>
      <div class="section-text" id="serviceDescription">
        Loading description…
      </div>
    </section>

    <section class="card">
      <div class="section-title">Reviews</div>
      <div class="reviews" id="reviewsContainer">
        Loading reviews…
      </div>
    </section>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    function getCategoryIcon(category) {
      const c = (category || '').toLowerCase();
      if (c === 'hospital') return '➕';
      if (c === 'clinic') return '🩺';
      if (c === 'school') return '🏫';
      if (c === 'restaurant') return '🍽️';
      if (c === 'grocery') return '🛒';
      return '⭐';
    }

    function buildRatingPieces(s) {
      const avg = Number(s.averageRating || 0);
      const avgLabel = avg > 0 ? avg.toFixed(1) : 'New';
      const ratingsCount = Number(s.ratingCount || 0);
      const reviewsCount = Number(s.reviewCount || 0);
      const ratingsLabel = ratingsCount === 1 ? '1 rating' : ratingsCount + ' ratings';
      const reviewsLabel =
        reviewsCount === 0
          ? 'No reviews'
          : reviewsCount === 1
          ? '1 review'
          : reviewsCount + ' reviews';
      return { avgLabel, ratingsLabel, reviewsLabel };
    }

    async function loadService() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('serviceNameTop').textContent = 'Service not found';
        return;
      }

      try {
        const res = await fetch(API_BASE + '/services/' + encodeURIComponent(id));
        if (!res.ok) throw new Error('Failed to load service');
        const data = await res.json();

        const s = data.service || data;
        const { avgLabel, ratingsLabel, reviewsLabel } = buildRatingPieces(s);

        document.getElementById('serviceNameTop').textContent = s.name || 'Service';
        document.getElementById('serviceCityTop').textContent = s.city || '';
        document.getElementById('serviceName').textContent = s.name || 'Service';
        document.getElementById('serviceMeta').textContent =
          (s.category || 'Service') + (s.city ? ' • ' + s.city : '');
        document.getElementById('serviceIcon').textContent = getCategoryIcon(s.category);

        document.getElementById('ratingValue').textContent = avgLabel;
        document.getElementById('ratingCounts').textContent =
          ratingsLabel + ' • ' + reviewsLabel;

        document.getElementById('serviceDescription').textContent =
          s.description || 'No description added yet.';
      } catch (err) {
        console.error(err);
        document.getElementById('serviceDescription').textContent =
          'Error loading service details.';
      }
    }

    async function loadReviews() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      const container = document.getElementById('reviewsContainer');
      container.textContent = 'Loading reviews…';

      try {
        const res = await fetch(API_BASE + '/services/' + encodeURIComponent(id) + '/reviews');
        if (!res.ok) throw new Error('Failed to load reviews');
        const data = await res.json();
        const reviews = data.reviews || [];

        if (!reviews.length) {
          container.textContent = 'No reviews yet.';
          return;
        }

        container.innerHTML = '';
        reviews.forEach((r) => {
          const div = document.createElement('div');
          div.className = 'review-item';
          div.innerHTML = `
            <div class="review-author">${r.authorName || 'Anonymous'}</div>
            <div class="review-text">${r.comment || ''}</div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        container.textContent = 'Error loading reviews.';
      }
    }

    async function requestRemoval() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) return;

      if (!confirm('Request admin to remove this service?')) return;

      try {
        const res = await fetch(API_BASE + '/services/' + encodeURIComponent(id) + '/request-remove', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          alert(data.message || 'Failed to send request');
          return;
        }
        alert(data.message || 'Removal request sent to admin.');
      } catch (err) {
        console.error(err);
        alert('Error sending removal request.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadService();
      loadReviews();

      const btn = document.getElementById('requestRemovalBtn');
      if (btn) {
        btn.addEventListener('click', requestRemoval);
      }
    });
  </script>
</body>
</html>
