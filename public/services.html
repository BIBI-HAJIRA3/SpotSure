<!-- SpotSure/public/services.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

/* GLOBAL DARK GLASS THEME */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #020617 0, #020617 40%, #020617 100%);
  background-color: #020617;
  background-size: 200% 200%;
  animation: bgShift 18s ease-in-out infinite;
  color: #e5e7eb;
  position: relative;
  overflow-x: hidden; /* allow vertical scroll */
}

/* Background image layer – softened to sync with index */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url("/images/bg1.jpg") center center / cover no-repeat;
  opacity: 0.25;
  z-index: -2;
}

/* Speckle layer (unchanged) */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 25%, rgba(30,64,175,0.18) 0, transparent 55%),
    radial-gradient(2px 2px at 80% 70%, rgba(15,23,42,0.18) 0, transparent 55%),
    radial-gradient(1.5px 1.5px at 40% 82%, rgba(30,64,175,0.12) 0, transparent 60%);
  opacity: 0.45;
  mix-blend-mode: normal;
  z-index: -1;
}
@keyframes bgShift {
  0% { background-position: 0% 40%; }
  50% { background-position: 100% 60%; }
  100% { background-position: 0% 40%; }
}

.app-shell {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 20px 14px 28px;
  position: relative;
  z-index: 1;
}

/* TOP BAR */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.top-title-block {
  display: flex;
  flex-direction: column;  /* icon on top, text below */
  align-items: flex-start; /* or center if you prefer */
  gap: 4px;
}
.top-logo-pill {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 18px rgba(37,99,235,0.8);
  background: #020617;
}
.top-logo-pill img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.top-sub {
  font-size: 12px;
  color: #9ca3af;
}

/* BUTTONS */
.pill-btn {
  border: 1px solid #4b5563;
  background: #020617;
  color: #e5e7eb;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 12px 26px rgba(0,0,0,1);
}
.pill-btn.secondary {
  background: #020617;
  color: #e5e7eb;
}
.pill-btn:hover {
  background: #020617;
  transform: translateY(-2px);
  box-shadow: 0 18px 36px rgba(0,0,0,1);
  border-color: #6b7280;
}

/* SEARCH + FILTERS */
.search-section {
  margin-bottom: 10px;
}
.search-input {
  width: 100%;
  padding: 8px 11px;
  border-radius: 999px;
  border: 1px solid #374151;
  font-size: 13px;
  outline: none;
  background: rgba(15,23,42,0.97);
  color: #e5e7eb;
  box-shadow: 0 10px 30px rgba(0,0,0,1);
}
.search-input::placeholder {
  color: #6b7280;
}
.search-input:focus {
  border-color: #4b5563;
  box-shadow: 0 0 0 1px rgba(55,65,81,0.8);
}

.helper-text {
  font-size: 12px;
  color: #9ca3af;
  margin-bottom: 4px;
  margin-top: 4px;
}

/* chip row only; label removed */
.chip-row {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  padding: 4px 0 10px;
}
.chip-row::-webkit-scrollbar {
  display: none;
}
.chip {
  flex-shrink: 0;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid #27272f;
  font-size: 12px;
  background: rgba(15,23,42,0.96);
  color: #d1d5db;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  box-shadow: 0 10px 20px rgba(0,0,0,0.9);
}
.chip.active {
  border-color: #4b5563;
  background: #020617;
  color: #e5e7eb;
}
.chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 14px 32px rgba(0,0,0,1);
}

/* SORT */
.sort-row {
  margin: 4px 0 10px;
  display: flex;
  justify-content: flex-end;
}
.sort-select {
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid #374151;
  background: rgba(15,23,42,0.97);
  color: #d1d5db;
  font-size: 11px;
  box-shadow: 0 10px 26px rgba(0,0,0,1);
}
.sort-select:focus {
  outline: none;
  border-color: #4b5563;
}

/* LIST + CARDS */
.list-section-title {
  margin: 8px 0;
  font-size: 14px;
  font-weight: 600;
  color: #e5e7eb;
}

.services-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
.service-card {
  display: flex;
  gap: 12px;
  background: rgba(15,23,42,0.90);
  border-radius: 18px;
  padding: 13px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.95);
  cursor: pointer;
  border: 1px solid rgba(31,41,55,0.88);
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  backdrop-filter: blur(20px);
}
.service-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 30px 90px rgba(0,0,0,0.98);
  border-color: #9ca3af;
}
.service-icon {
  width: 54px;
  height: 54px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #d1d5db;
  flex-shrink: 0;
  background: radial-gradient(circle at 0 0, #111827 0, #020617 55%, #020617 100%);
  box-shadow: 0 6px 18px rgba(0,0,0,0.9);
}
.service-icon.hospital {
  background: radial-gradient(circle at 0 0, #0f172a 0, #020617 55%, #020617 100%);
}
.service-icon.clinic {
  background: radial-gradient(circle at 0 0, #022c22 0, #020617 55%, #020617 100%);
}
.service-icon.school {
  background: radial-gradient(circle at 0 0, #1e1b4b 0, #020617 55%, #020617 100%);
}
.service-icon.restaurant {
  background: radial-gradient(circle at 0 0, #451a03 0, #020617 55%, #020617 100%);
}
.service-icon.grocery {
  background: radial-gradient(circle at 0 0, #064e3b 0, #020617 55%, #020617 100%);
}
.service-icon.college {
  background: radial-gradient(circle at 0 0, #1f2937 0, #020617 55%, #020617 100%);
}

.service-info h3 {
  margin: 0 0 4px 0;
  font-size: 15px;
  color: #f9fafb;
}
.service-info p {
  margin: 0;
  font-size: 12px;
  color: #9ca3af;
  line-height: 1.3;
}
.rating-row-mini {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: 11px;
  color: #9ca3af;
}
.rating-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border-radius: 999px;
  padding: 3px 8px;
  background: rgba(34,197,94,0.16);
  color: #bbf7d0;
  font-size: 11px;
}
.rating-badge span.star {
  color: #fbbf24;
}

.category-icon {
  font-size: 13px;
}

@media (min-width: 600px) {
  .app-shell {
    padding: 22px 18px 30px;
  }
}

/* optional small-screen adjustment for nicer stacking */
@media (max-width: 480px) {
  .top-bar {
    align-items: flex-start;
  }
}
</style>
</head>
<body>
<div class="app-shell">
  <header class="top-bar">
    <div class="top-title-block">
      <div class="top-logo-pill">
        <img src="/images/app_icon.jpg" alt="SpotSure icon">
      </div>
      <div class="top-sub" id="welcomeUserLine"></div>
    </div>
    <div style="display:flex; gap:6px; align-items:center;">
      <button
        class="pill-btn secondary"
        type="button"
        title="Admin"
        style="padding:4px 8px; min-width:auto;"
        onclick="window.location.href='/admin.html'"
      >
        🛡️
      </button>

      <button
        class="pill-btn secondary"
        type="button"
        title="Email SpotSure"
        style="padding:4px 8px; min-width:auto;"
        onclick="window.location.href='https://mail.google.com/mail/?view=cm&fs=1&to=hajirabibi485@gmail.com'"
      >
        ✉️
      </button>

      <button class="pill-btn" type="button" onclick="window.location.href='/add-service.html'">
        + Request service
      </button>
    </div>
  </header>

  <section class="search-section">
    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="Search by name, city, pincode, or category..."
    />
  </section>

  <!-- Filter label removed -->
  <div class="chip-row">
    <button class="chip active category-btn" data-category="All">
      <span class="category-icon">⭐</span><span>All</span>
    </button>
    <button class="chip category-btn" data-category="Hospital">
      <span class="category-icon">➕</span><span>Hospitals</span>
    </button>
    <button class="chip category-btn" data-category="Clinic">
      <span class="category-icon">🩺</span><span>Clinics</span>
    </button>
    <button class="chip category-btn" data-category="School">
      <span class="category-icon">🏫</span><span>Schools</span>
    </button>
    <button class="chip category-btn" data-category="College">
      <span class="category-icon">🎓</span><span>Colleges</span>
    </button>
    <button class="chip category-btn" data-category="Restaurant">
      <span class="category-icon">🍽️</span><span>Restaurants</span>
    </button>
    <button class="chip category-btn" data-category="Grocery">
      <span class="category-icon">🛒</span><span>Grocery</span>
    </button>
  </div>

  <div class="sort-row">
    <select id="sortSelect" class="sort-select">
      <option value="none">Sort: none</option>
      <option value="high">Highest rated</option>
      <option value="low">Lowest rated</option>
    </select>
  </div>

  <div class="list-section-title"></div>
  <div id="services" class="services-list"></div>
</div>

<script>
const API_BASE = window.location.origin + '/api';

let allServices = [];
let currentCategory = 'All';
let sortMode = 'none';

function getUsername() {
  return localStorage.getItem('spotsureUsername') || null;
}
function updateUserLine() {
  const line = document.getElementById('welcomeUserLine');
  const name = getUsername();
  if (!line) return;
  if (name) line.textContent = 'Welcome back, ' + name;
  else line.textContent = '';
}

function getCategoryIcon(category) {
  const c = (category || '').toLowerCase();
  if (c === 'hospital') return '➕';
  if (c === 'clinic') return '🩺';
  if (c === 'school') return '🏫';
  if (c === 'college') return '🎓';
  if (c === 'restaurant') return '🍽️';
  if (c === 'grocery') return '🛒';
  return '⭐';
}

function getCategoryClass(category) {
  const c = (category || '').toLowerCase();
  if (c === 'hospital') return 'hospital';
  if (c === 'clinic') return 'clinic';
  if (c === 'school') return 'school';
  if (c === 'college') return 'college';
  if (c === 'restaurant') return 'restaurant';
  if (c === 'grocery') return 'grocery';
  return '';
}

function buildRatingPieces(s) {
  const avg = Number(s.averageRating || 0);
  const avgLabel = avg > 0 ? avg.toFixed(1) : 'New';
  const ratingsCount = Number(s.ratingCount || 0);
  const reviewsCount = Number(s.reviewCount || 0);
  const ratingsLabel = ratingsCount === 1 ? '1 rating' : ratingsCount + ' ratings';
  const reviewsLabel =
    reviewsCount === 0
      ? 'No reviews'
      : reviewsCount === 1
      ? '1 review'
      : reviewsCount + ' reviews';
  return { avg, avgLabel, ratingsLabel, reviewsLabel };
}

function filterServices() {
  const searchInput = document.getElementById('searchInput');
  const searchText = searchInput ? searchInput.value.trim().toLowerCase() : '';

  let list = allServices.filter((s) => {
    const matchesSidebarCategory =
      currentCategory === 'All' ||
      (s.category && s.category.toLowerCase() === currentCategory.toLowerCase());

    if (!searchText) return matchesSidebarCategory;

    const fields = [s.name || '', s.city || '', s.pincode || '', s.category || ''].map((x) =>
      String(x).toLowerCase()
    );

    const matchesSearch = fields.some((f) => f.includes(searchText));

    return matchesSidebarCategory && matchesSearch;
  });

  if (sortMode === 'high') {
    list = list
      .slice()
      .sort((a, b) => (b.averageRating || 0) - (a.averageRating || 0));
  }
  if (sortMode === 'low') {
    list = list
      .slice()
      .sort((a, b) => (a.averageRating || 0) - (b.averageRating || 0));
  }

  return list;
}

function openServicePage(serviceId) {
  window.location.href = '/service.html?id=' + encodeURIComponent(serviceId);
}

function renderServices() {
  const container = document.getElementById('services');
  container.innerHTML = '';
  const services = filterServices();
  if (!services.length) {
    container.innerHTML =
      '<p style="font-size:13px; color:#9ca3af;">No services found.</p>';
    return;
  }
  services.forEach((s) => {
    const card = document.createElement('div');
    card.className = 'service-card';
    card.addEventListener('click', () => openServicePage(s._id));

    const iconDiv = document.createElement('div');
    iconDiv.className = 'service-icon ' + getCategoryClass(s.category);
    iconDiv.textContent = getCategoryIcon(s.category);

    const info = document.createElement('div');
    info.className = 'service-info';

    const { avgLabel, ratingsLabel, reviewsLabel } = buildRatingPieces(s);

    info.innerHTML = `
      <h3>${s.name}</h3>
      <p>
        <span class="category-icon">${getCategoryIcon(s.category)}</span>
        <span>${s.category || 'Service'} • ${s.city || ''}</span>
      </p>
      <div class="rating-row-mini">
        <span class="rating-badge">
          <span class="star">★</span>
          <span>${avgLabel}</span>
        </span>
        <span>${ratingsLabel} • ${reviewsLabel}</span>
      </div>
    `;

    card.appendChild(iconDiv);
    card.appendChild(info);
    container.appendChild(card);
  });
}

async function loadServices() {
  try {
    const res = await fetch(API_BASE + '/services');
    if (!res.ok) throw new Error('Failed to load services');
    const data = await res.json();
    allServices = data.services || data;
    renderServices();
  } catch (err) {
    console.error(err);
    const container = document.getElementById('services');
    container.innerHTML =
      '<p style="font-size:13px; color:#f97316;">Error loading services.</p>';
  }
}

function setupCategoryFilters() {
  const buttons = document.querySelectorAll('.category-btn');
  buttons.forEach((btn) => {
    btn.addEventListener('click', () => {
      buttons.forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.getAttribute('data-category');
      renderServices();
    });
  });
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  if (input) {
    input.addEventListener('input', () => renderServices());
  }
}

function setupSortDropdown() {
  const select = document.getElementById('sortSelect');
  if (!select) return;
  select.addEventListener('change', () => {
    sortMode = select.value; // 'none' | 'high' | 'low'
    renderServices();
  });
}

document.addEventListener('DOMContentLoaded', () => {
  updateUserLine();
  loadServices();
  setupCategoryFilters();
  setupSearch();
  setupSortDropdown();
});
</script>
</body>
</html>
