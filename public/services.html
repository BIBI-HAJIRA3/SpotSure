<!-- SpotSure/public/services.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>SpotSure – Services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; }

body {
font-family: Arial, sans-serif;
margin: 0;
background: radial-gradient(circle at top, #0f172a 0, #020617 55%, #000 100%);
color: #e5e7eb;
}
body::before {
content: "";
position: fixed;
inset: 0;
pointer-events: none;
background-image:
  radial-gradient(2px 2px at 20% 30%, rgba(148,163,184,0.18) 0, transparent 55%),
  radial-gradient(1px 1px at 80% 70%, rgba(148,163,184,0.14) 0, transparent 55%),
  radial-gradient(1.5px 1.5px at 40% 80%, rgba(148,163,184,0.1) 0, transparent 60%);
opacity: 0.6;
z-index: -1;
}

.app-shell {
max-width: 520px;
margin: 0 auto;
min-height: 100vh;
display: flex;
flex-direction: column;
padding: 20px 14px 28px;
}

.top-bar {
display: flex;
align-items: center;
justify-content: space-between;
gap: 10px;
margin-bottom: 16px;
flex-wrap: wrap;
}
.top-title {
font-size: 20px;
font-weight: 700;
color: #f9fafb;
}
.top-sub {
font-size: 12px;
color: #9ca3af;
}

.pill-btn {
border: 1px solid #2563eb;
background: #2563eb;
color: #ffffff;
border-radius: 999px;
padding: 6px 10px;
font-size: 12px;
cursor: pointer;
white-space: nowrap;
transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.pill-btn.secondary {
background: #020617;
color: #93c5fd;
}
.pill-btn:hover {
background: #1d4ed8;
transform: translateY(-1px);
box-shadow: 0 6px 14px rgba(15,23,42,0.7);
}

.search-section {
margin-bottom: 10px;
}
.search-input {
width: 100%;
padding: 8px 11px;
border-radius: 999px;
border: 1px solid #374151;
font-size: 13px;
outline: none;
background: #020617;
color: #e5e7eb;
}
.search-input::placeholder {
color: #6b7280;
}

.helper-text {
font-size: 12px;
color: #9ca3af;
margin-bottom: 4px;
margin-top: 4px;
}

.chip-row {
display: flex;
overflow-x: auto;
gap: 6px;
padding: 4px 0 10px;
}
.chip-row::-webkit-scrollbar {
display: none;
}
.chip {
flex-shrink: 0;
padding: 5px 10px;
border-radius: 999px;
border: 1px solid #374151;
font-size: 12px;
background: #020617;
color: #d1d5db;
cursor: pointer;
display: inline-flex;
align-items: center;
gap: 5px;
transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.chip.active {
border-color: #2563eb;
background: #2563eb;
color: #ffffff;
}
.chip:hover {
transform: translateY(-1px);
box-shadow: 0 6px 14px rgba(15,23,42,0.7);
}

.list-section-title {
margin: 8px 0;
font-size: 14px;
font-weight: 600;
color: #e5e7eb;
}

.services-list {
display: flex;
flex-direction: column;
gap: 12px;
margin-bottom: 20px;
}
.service-card {
display: flex;
gap: 12px;
background: #0b1120;
border-radius: 14px;
padding: 13px;
box-shadow: 0 8px 20px rgba(0,0,0,0.6);
cursor: pointer;
border: 1px solid #1f2937;
transition: transform 0.15s ease, box-shadow 0.15s ease;
backdrop-filter: blur(4px);
}
.service-card:hover {
transform: translateY(-2px);
box-shadow: 0 10px 24px rgba(15,23,42,0.9);
}
.service-thumb {
width: 60px;
height: 60px;
border-radius: 10px;
object-fit: cover;
flex-shrink: 0;
background: linear-gradient(135deg, #1d4ed8, #0f172a);
box-shadow: 0 4px 10px rgba(15,23,42,0.9);
}
.service-info h3 {
margin: 0 0 4px 0;
font-size: 15px;
color: #f9fafb;
}
.service-info p {
margin: 0;
font-size: 12px;
color: #9ca3af;
line-height: 1.3;
}
.rating-row-mini {
display: flex;
align-items: center;
gap: 6px;
margin-top: 6px;
font-size: 11px;
color: #9ca3af;
}
.rating-badge {
display: inline-flex;
align-items: center;
gap: 4px;
border-radius: 999px;
padding: 3px 8px;
background: rgba(34,197,94,0.14);
color: #bbf7d0;
font-size: 11px;
}
.rating-badge span.star {
color: #fbbf24;
}

/* Category icon in line */
.category-icon {
font-size: 13px;
}

#toast {
position: fixed;
left: 50%;
bottom: 20px;
transform: translateX(-50%);
background: #111827;
color: #e5e7eb;
padding: 10px 12px 8px;
border-radius: 12px;
font-size: 13px;
box-shadow: 0 4px 10px rgba(0,0,0,0.6);
opacity: 0;
pointer-events: none;
transition: opacity 0.2s ease, transform 0.2s ease;
z-index: 60;
max-width: 90%;
text-align: left;
white-space: pre-line;
}
#toastMessage {
margin-right: 60px;
}
#toastOkBtn {
margin-top: 6px;
padding: 4px 10px;
border-radius: 999px;
border: 1px solid #2563eb;
background: #2563eb;
color: #fff;
font-size: 12px;
cursor: pointer;
float: right;
}

@media (min-width: 600px) {
.app-shell {
padding: 22px 18px 30px;
}
}
</style>
</head>
<body>
<div class="app-shell">
<header class="top-bar">
<div>
<div class="top-title">SpotSure</div>
<div class="top-sub" id="welcomeUserLine"></div>
</div>
<div style="display:flex; gap:6px;">
<button class="pill-btn" type="button" onclick="window.location.href='/add-service.html'">
+ Request service
</button>
</div>
</header>

<section class="search-section">
<input
id="searchInput"
class="search-input"
type="text"
placeholder="Search by name, city, pincode, or category..."
/>
</section>

<div class="helper-text">Filter by category</div>
<div class="chip-row">
<button class="chip active category-btn" data-category="All">
<span class="category-icon">⭐</span><span>All</span>
</button>
<button class="chip category-btn" data-category="Hospital">
<span class="category-icon">➕</span><span>Hospitals</span>
</button>
<button class="chip category-btn" data-category="Clinic">
<span class="category-icon">🩺</span><span>Clinics</span>
</button>
<button class="chip category-btn" data-category="School">
<span class="category-icon">🏫</span><span>Schools</span>
</button>
<button class="chip category-btn" data-category="Restaurant">
<span class="category-icon">🍽️</span><span>Restaurants</span>
</button>
<button class="chip category-btn" data-category="Grocery">
<span class="category-icon">🛒</span><span>Grocery</span>
</button>
</div>

<div class="list-section-title"></div>
<div id="services" class="services-list"></div>
</div>

<div id="toast">
<div id="toastMessage"></div>
<button id="toastOkBtn">OK</button>
<div style="clear:both;"></div>
</div>

<script>
const API_BASE = window.location.origin + '/api';

let allServices = [];
let currentCategory = 'All';

function showToast(message) {
const t = document.getElementById('toast');
const msg = document.getElementById('toastMessage');
const ok = document.getElementById('toastOkBtn');
if (!t || !msg || !ok) return;

msg.textContent = message;
t.style.opacity = '1';
t.style.pointerEvents = 'auto';
t.style.transform = 'translateX(-50%) translateY(-4px)';

ok.onclick = () => {
t.style.opacity = '0';
t.style.pointerEvents = 'none';
t.style.transform = 'translateX(-50%) translateY(0)';
};
}

function getUsername() {
return localStorage.getItem('spotsureUsername') || null;
}
function setUsername(name) {
localStorage.setItem('spotsureUsername', name);
updateUserLine();
}
function updateUserLine() {
const line = document.getElementById('welcomeUserLine');
const name = getUsername();
if (!line) return;
if (name) line.textContent = 'Welcome back, ' + name;
else line.textContent = '';
}

function getCategoryIcon(category) {
const c = (category || '').toLowerCase();
if (c === 'hospital') return '➕';
if (c === 'clinic') return '🩺';
if (c === 'school') return '🏫';
if (c === 'restaurant') return '🍽️';
if (c === 'grocery') return '🛒';
return '⭐';
}

function getServiceImage(service) {
if (service.imagePath) {
return service.imagePath;
}
const c = (service.category || '').toLowerCase();
if (c === 'hospital' || c === 'clinic') {
return 'https://placehold.co/80x80/0b1120/38bdf8?text=%2B';
}
if (c === 'school') {
return 'https://placehold.co/80x80/0b1120/a855f7?text=S';
}
if (c === 'restaurant') {
return 'https://placehold.co/80x80/0b1120/f97316?text=R';
}
if (c === 'grocery') {
return 'https://placehold.co/80x80/0b1120/22c55e?text=G';
}
return 'https://placehold.co/80x80/020617/64748b?text=Svc';
}

function buildRatingText(s) {
const avg = Number(s.averageRating || 0);
const avgLabel = avg > 0 ? avg.toFixed(1) : 'New';
const ratingsCount = Number(s.ratingCount || 0);
const reviewsCount = Number(s.reviewCount || 0);
const ratingsLabel = ratingsCount === 1 ? '1 rating' : ratingsCount + ' ratings';
const reviewsLabel = reviewsCount === 0
? 'No reviews'
: (reviewsCount === 1 ? '1 review' : reviewsCount + ' reviews');
return { avgLabel, ratingsLabel, reviewsLabel };
}

function filterServices() {
const searchInput = document.getElementById('searchInput');
const searchText = searchInput
? searchInput.value.trim().toLowerCase()
: '';

let list = allServices.filter((s) => {
const matchesSidebarCategory =
currentCategory === 'All' ||
(s.category &&
s.category.toLowerCase() === currentCategory.toLowerCase());

if (!searchText) return matchesSidebarCategory;

const fields = [
s.name || '',
s.city || '',
s.pincode || '',
s.category || '',
].map((x) => String(x).toLowerCase());

const matchesSearch = fields.some((f) => f.includes(searchText));

return matchesSidebarCategory && matchesSearch;
});

return list;
}

function openServicePage(serviceId) {
window.location.href = '/service.html?id=' + encodeURIComponent(serviceId);
}

function renderServices() {
const container = document.getElementById('services');
container.innerHTML = '';
const services = filterServices();
if (!services.length) {
container.innerHTML = '<p style="font-size:13px; color:#9ca3af;">No services found.</p>';
return;
}
services.forEach((s) => {
const card = document.createElement('div');
card.className = 'service-card';
card.addEventListener('click', () => openServicePage(s._id));

const img = document.createElement('img');
img.className = 'service-thumb';
img.src = getServiceImage(s);

const info = document.createElement('div');
info.className = 'service-info';

const { avgLabel, ratingsLabel, reviewsLabel } = buildRatingText(s);

info.innerHTML = `
<h3>${s.name}</h3>
<p>
  <span class="category-icon">${getCategoryIcon(s.category)}</span>
  <span>${s.category || 'Service'} • ${s.city || ''}</span>
</p>
<div class="rating-row-mini">
  <span class="rating-badge">
    <span class="star">★</span>
    <span>${avgLabel}</span>
  </span>
  <span>${ratingsLabel} • ${reviewsLabel}</span>
</div>
`;

card.appendChild(img);
card.appendChild(info);
container.appendChild(card);
});
}

async function loadServices() {
try {
const res = await fetch(API_BASE + '/services');
if (!res.ok) throw new Error('Failed to load services');
const data = await res.json();
allServices = data.services || data;
renderServices();
} catch (err) {
console.error(err);
const container = document.getElementById('services');
container.innerHTML = '<p style="font-size:13px; color:#f97316;">Error loading services.</p>';
}
}

function setupCategoryFilters() {
const buttons = document.querySelectorAll('.category-btn');
buttons.forEach((btn) => {
btn.addEventListener('click', () => {
buttons.forEach((b) => b.classList.remove('active'));
btn.classList.add('active');
currentCategory = btn.getAttribute('data-category');
renderServices();
});
});
}

function setupSearch() {
const input = document.getElementById('searchInput');
if (input) {
input.addEventListener('input', () => renderServices());
}
}

document.addEventListener('DOMContentLoaded', () => {
updateUserLine();
loadServices();
setupCategoryFilters();
setupSearch();
});
</script>
</body>
</html>
